  <main class="receive">
    <div class="eyebrow"><span class="pip"></span> Your gift has arrived</div>

    <!-- the box comes up centre-stage, in a black portal on the aurora, note pinned beside it -->
    <section class="stage" id="stage">
      <div class="portal" aria-hidden="true"></div>
      <div class="above-icons" id="above-icons" aria-hidden="true"></div>
      <div class="landing"></div>
      <div class="scene" id="scene">
        <div class="box" id="box">
          <div class="cavity"></div>
          <div class="glow"></div>
          <div class="beam"></div>
          <div class="particles">
            <span class="particle"></span><span class="particle"></span><span class="particle"></span>
            <span class="particle"></span><span class="particle"></span><span class="particle"></span>
          </div>
          <div class="pop" id="pop"></div>

          <div class="face front">
            <div class="front-fx" data-role="pattern"></div>
            <div class="brandwrap">
              <h2 data-role="brand"></h2>
              <p class="sublabel" data-role="sublabel"></p>
            </div>
            <div class="specs"><span data-role="model">Model: GF-001</span><span data-role="qty">Qty: 1</span></div>
          </div>

          <div class="face right">
            <div class="front-fx" data-role="pattern"></div>
            <div class="label">
              <div class="label-title">PRIORITY</div>
              <div class="label-to" data-role="labelTo">To: someone</div>
              <div class="addr"></div><div class="addr short"></div>
              <div class="barcode"></div>
            </div>
            <div class="side-stamps" id="side-stamps"></div>
          </div>

          <div class="face left">
            <div class="front-fx" data-role="pattern"></div>
            <div class="side-stack">
              <div class="side-eyebrow">CARE</div>
              <div class="handling">
                <span class="hsym"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg></span>
                <span class="hsym"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8l-1.3 6.2a2.7 2.7 0 0 1-5.4 0z"/><path d="M12 12v8"/><path d="M8.5 20h7"/></svg></span>
                <span class="hsym"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4a8 8 0 0 1 8 8H4a8 8 0 0 1 8-8z"/><path d="M12 12v5.5a2 2 0 0 0 4 0"/></svg></span>
              </div>
              <div class="side-rule"></div>
              <div class="side-caption">HANDLE WITH CARE</div>
              <div class="side-barcode"></div>
            </div>
          </div>

          <div class="face back">
            <div class="front-fx" data-role="pattern"></div>
            <div class="back-grid">
              <div class="ret-block">
                <div class="side-eyebrow">FROM</div>
                <div class="ret-name" id="ret-name">GIIIFT</div>
                <div class="ret-line"></div><div class="ret-line short"></div>
              </div>
              <div class="postage"><span class="postage-star">✦</span><span class="postage-val">GF·01</span></div>
              <div class="postmark"><span>WRAPPED WITH CARE</span></div>
              <div class="side-barcode"></div>
            </div>
          </div>

          <div class="face bottom">
            <div class="front-fx" data-role="pattern"></div>
            <div class="bottom-stack">
              <div class="seal"><span class="seal-star">✦</span></div>
              <div class="made">SECURELY SEALED · MADE WITH ♥</div>
              <div class="serial" data-role="serial">SER · GF-0000</div>
            </div>
          </div>

          <div class="lid-plane">
            <div class="flap fl-left"><div class="front-fx" data-role="pattern"></div></div>
            <div class="flap fl-right"><div class="front-fx" data-role="pattern"></div></div>
            <div class="flap fl-back"><div class="front-fx" data-role="pattern"></div></div>
            <div class="flap fl-front"><div class="front-fx" data-role="pattern"></div></div>
            <div class="tape-wall"></div>
          </div>
        </div>
      </div>

      <!-- the sender's polaroids pop up pinned NEXT TO the box (in-column row on small screens) -->
      <div class="photo-scatter" id="photo-scatter" hidden></div>

      <!-- the reveal rail: note + what's inside — OFF the box -->
      <aside class="reveal-rail" id="reveal-rail">
        <div class="gift-note" id="gift-note">
          <span class="gn-pin"></span>
          <div class="gn-eyebrow">A note</div>
          <div class="gn-text" id="note-text"></div>
          <div class="gn-from">— <b id="from-name">a friend</b></div>
        </div>
        <div class="contents manifest" id="manifest" hidden>
          <div class="m-title">What's inside</div>
          <div class="c-list" id="c-list"></div>
        </div>
      </aside>
    </section>

    <div class="reveal-foot">
      <div class="from-line">for <b id="to-name">you</b></div>
      <button class="open-cta" id="open-cta">Open your gift →</button>
    </div>
  </main>

  <script type="module">
    // ---------- the gift: decode /box?g=<token> (create-page link) ----------
    const DEMO = {
      to: "To: you", msg: "Happy Birthday", from: "Colby",
      items: [
        { ticker: "BTC", name: "Bitcoin", color: "#F7931A", amount: "0.05" },
        { ticker: "ETH", name: "Ethereum", color: "#627EEA", amount: "1.5" },
        { ticker: "SOL", name: "Solana", color: "#14F195", amount: "20" },
      ],
      design: { brand: "Happy Birthday", sublabel: "A GIFT FOR YOU", note: "hope this brightens your day",
        labelTo: "To: you", model: "Model: GF-001", qty: "Qty: 3",
        finish: "gradient", cardboard: "#7c3aed", cardboard2: "#ec4899", angle: 135, pattern: "dots", accent: "#fde68a",
        ph: ["/showcase/send.jpg", "/showcase/parcel.png"] },   // baked demo polaroids so the showcase shows the photo pop
    };
    function decodeGift(token) {
      const p = token.replace(/-/g, "+").replace(/_/g, "/");
      const b = p + "=".repeat((4 - p.length % 4) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(b))));
    }
    // ---- compact-link support: expand the short token (from wrap.html) to the full gift ----
    // Each asset's name/colour is re-derived from its ticker so the link itself stays tiny.
    const ASSET_NAMES = { BTC:"Bitcoin", ETH:"Ethereum", USDC:"USD Coin", USDT:"Tether", SOL:"Solana", BNB:"BNB", XRP:"XRP", ADA:"Cardano", DOGE:"Dogecoin", AVAX:"Avalanche", DOT:"Polkadot", MATIC:"Polygon", LINK:"Chainlink", LTC:"Litecoin", TRX:"TRON", UNI:"Uniswap", ATOM:"Cosmos", XLM:"Stellar", ZEC:"Zcash", XMR:"Monero", NEAR:"NEAR", APT:"Aptos", ARB:"Arbitrum", OP:"Optimism", SHIB:"Shiba Inu", PEPE:"Pepe", NFT:"NFT / collectible" };
    const ASSET_COLORS = { BTC:"#F7931A", ETH:"#627EEA", USDC:"#2775CA", USDT:"#26A17B", SOL:"#14F195", BNB:"#F3BA2F", XRP:"#23292F", ADA:"#0033AD", DOGE:"#C2A633", AVAX:"#E84142", DOT:"#E6007A", MATIC:"#8247E5", LINK:"#2A5ADA", LTC:"#A6A9AA", TRX:"#EF0027", UNI:"#FF007A", ATOM:"#2E3148", XLM:"#7D00FF", ZEC:"#ECB244", XMR:"#FF6600", NEAR:"#00C08B", APT:"#10E0C0", ARB:"#28A0F0", OP:"#FF0420", SHIB:"#FFA409", PEPE:"#3D8130", NFT:"#B06CF0" };
    function expandGift(g) {
      const DEF = { finish:"gradient", cardboard:"#7c3aed", cardboard2:"#ec4899", angle:135, pattern:"dots", accent:"#fde68a", sublabel:"A GIFT FOR YOU", model:"Model: GF-001" };
      const d = g.d || {};
      const toName = g.t || "";
      // A gift payload is attacker-controllable, so validate anything that becomes a
      // CSS value, className, or URL. Text fields render via textContent (XSS-safe).
      const hex = (v, f) => (typeof v === "string" && /^#[0-9a-fA-F]{3,8}$/.test(v)) ? v : f;
      const PATS = new Set(["stripes","dots","grid","chevron","crosshatch","waves","checker","rings","plus","diagonal","weave","none"]);
      const FINS = new Set(["gradient","holo","matte","solid"]);
      const items = (g.i || []).map(a => {
        const ticker = String((a && a[0]) || "").replace(/[^A-Za-z0-9]/g, "").slice(0, 12).toUpperCase();
        const amount = (a && a[1] != null) ? String(a[1]).slice(0, 24) : "";
        const isNft = ticker === "NFT";
        return { ticker, amount, name: ASSET_NAMES[ticker] || ticker || "Asset", color: ASSET_COLORS[ticker] || "#888", glyph: isNft ? "✦" : undefined };
      });
      return {
        to: toName ? "To: " + toName : "", from: g.f || "", msg: g.m || "", items,
        // the sender's vertical rides inside the payload (attacker-controllable → validate the shape)
        v: (typeof g.v === "string" && /^[a-z0-9-]{1,24}$/.test(g.v)) ? g.v : "",
        // optional occasion → personalizes the shop's lead shelf after claim
        o: (typeof g.o === "string") ? g.o.slice(0, 24) : "",
        // optional retail mandate (the "candle" flow, retail-gifting V1): r = { p: <menu
        // product id> }. A SUGGESTION only; validated like other registry slugs, and the
        // gift remains a normal balance gift if the id is unknown.
        mandate: (g.r && typeof g.r.p === "string" && /^[a-z0-9-]{1,40}$/.test(g.r.p)) ? { productId: g.r.p } : null,
        design: {
          brand: g.m || "", note: g.n || "", from: g.f || "",
          labelTo: toName ? "To: " + toName : "To: someone",
          finish: FINS.has(d.f) ? d.f : DEF.finish,
          cardboard: hex(d.c, DEF.cardboard), cardboard2: hex(d.k, DEF.cardboard2), accent: hex(d.x, DEF.accent),
          angle: (typeof d.a === "number" && d.a >= 0 && d.a <= 360) ? d.a : DEF.angle,
          pattern: PATS.has(d.p) ? d.p : DEF.pattern,
          sublabel: d.s || DEF.sublabel, model: d.md || DEF.model,
          // box template (the wrap "Box designs" gallery); validated like the
          // vertical slug — it becomes a registry lookup, never markup
          tp: (typeof d.tp === "string" && /^[a-z0-9-]{1,24}$/.test(d.tp)) ? d.tp : "",
          // polaroid photos: a localStorage key (same-device demo; wrap stores the
          // compressed shots under giiift-photos:<key>) OR a baked array of image
          // URLs/paths (future backend / authored demos). Never markup.
          ph: (typeof d.ph === "string" && /^[a-z0-9]{4,24}$/i.test(d.ph)) ? d.ph
            : (Array.isArray(d.ph) ? d.ph.filter(u => typeof u === "string" && /^(\/|https:\/\/|data:image\/)/.test(u)).slice(0, 3) : ""),
        },
      };
    }
    // Resolve the gift: a short Supabase code (/g/<code> or ?g=<code>), a long
    // self-contained token, or the demo. Short codes look the payload up in
    // Supabase; if that's unavailable the page falls back to the demo box.
    const SB = (window.GIIIFT_SUPABASE && window.GIIIFT_SUPABASE.url && window.GIIIFT_SUPABASE.key) ? window.GIIIFT_SUPABASE : null;
    const params = new URLSearchParams(location.search);
    const pathCode = (location.pathname.match(/\/g\/([A-Za-z0-9_-]{3,32})/) || [])[1] || null;
    const token = params.get("g") || params.get("gift") || pathCode || "";
    // ---- invitation links (/i/<code>, link-gifting M1): resolve the intent ----
    // The GET is redacted until funded (wrap design only, no items/note); with the
    // claimant's Bearer token it returns the FULL payload once funded, so a reload
    // at "funded" boots this page straight into the normal openable-gift flow.
    const intentCode = (location.pathname.match(/\/i\/([A-Za-z0-9]{6,20})/) || [])[1] || null;
    let INTENT = null, intentMissing = false;
    let gift = DEMO;
    if (intentCode) {
      const ri = window.GIIIFTIntent ? await window.GIIIFTIntent.get(intentCode) : { ok: false };
      if (ri.ok && ri.data && ri.data.status) {
        INTENT = ri.data;
        try { gift = expandGift(INTENT.payload || {}); } catch (e) { console.error("[GIIIFT] intent payload:", e); }
        if (window.giiift && window.giiift.track) window.giiift.track("intent_viewed", { status: INTENT.status });
      } else {
        intentMissing = true;
        console.error("[GIIIFT] intent not found:", intentCode, ri.status);
      }
    }
    if (token && /^[A-Za-z0-9_-]{3,20}$/.test(token)) {
      // short code → fetch the stored payload from Supabase
      if (SB) {
        try {
          const res = await fetch(SB.url + "/rest/v1/rpc/get_gift", {
            method: "POST",
            headers: { apikey: SB.key, Authorization: "Bearer " + SB.key, "Content-Type": "application/json" },
            body: JSON.stringify({ gift_code: token }),
          });
          const payload = res.ok ? await res.json() : null;
          if (payload) gift = expandGift(payload);
          else console.error("[GIIIFT] gift not found for code:", token, res.status);
        } catch (e) { console.error("[GIIIFT] short-link lookup failed:", e); }
      }
    } else if (token) {
      // self-contained link (long base64url payload)
      try { gift = decodeGift(token); if (Array.isArray(gift.i)) gift = expandGift(gift); }
      catch (e) { console.error("[GIIIFT] couldn't decode gift token:", e); }
    }
    const design = gift.design || {};
    const items = gift.items || [];

    // ---------- vertical funnel: the gift speaks its sender's flow ----------
    // Resolution order: explicit ?v= → the payload's own v → inference from the
    // gift's contents/words (an organic "for your Pokémon binder" note still
    // lights the TCG skin) → the sticky session → core.
    const V = window.GIIIFTVertical || null;
    if (V) {
      V.resolve({
        payload: gift.v || "",
        items: items.map(it => `${it.ticker || ""} ${it.name || ""}`),
        text: [gift.msg, design.note, design.sublabel, design.brand],
      });
      V.applyTheme();
    }
    const vtxt = (path, tokens, fb) => { const s = V ? V.text("copy.receive." + path, tokens) : ""; return s || fb || ""; };

    // vertical asset voice (mirrors wrap.html): the manifest + vault claims show
    // "Card pick" instead of "NFT / collectible" when the gift rode in on /tcg
    (function aliasItems() {
      const aliases = (V && V.get("copy.assets")) || {};
      items.forEach(it => { if (aliases[it.ticker]) it.name = aliases[it.ticker]; });
    })();

    // If the sender never touched the design (all stock colours), the vertical
    // tints the whole receive scene - box, package, aurora - instead of the
    // stock purple/pink, so a /tcg pack still LANDS as a pack.
    (function verticalDefaultTint() {
      const va = V && V.get("receive.aurora");
      if (!va) return;
      const stock = (!design.cardboard || design.cardboard.toLowerCase() === "#7c3aed")
        && (!design.cardboard2 || design.cardboard2.toLowerCase() === "#ec4899")
        && (!design.accent || design.accent.toLowerCase() === "#fde68a");
      if (!stock) return;
      design.cardboard = va.c1 || design.cardboard;
      design.cardboard2 = va.c2 || design.cardboard2;
      design.accent = va.accent || design.accent;
    })();

    // swap the static receive copy to the vertical's voice (no-op on core)
    (function applyVerticalCopy() {
      if (!V) return;
      document.title = vtxt("docTitle", null, document.title);
      const eb = document.querySelector(".receive .eyebrow");
      if (eb && vtxt("eyebrow")) eb.innerHTML = '<span class="pip"></span> ' + vtxt("eyebrow");
      const hintEl = document.querySelector(".ri-hint");
      if (hintEl && vtxt("tapHint")) hintEl.innerHTML = '<span class="pip"></span>' + vtxt("tapHint");
      const mt = document.querySelector("#manifest .m-title");
      if (mt && vtxt("manifestTitle")) mt.textContent = vtxt("manifestTitle");
      const ge = document.querySelector("#gift-note .gn-eyebrow");
      if (ge && vtxt("noteEyebrow")) ge.textContent = vtxt("noteEyebrow");
      const oc = document.getElementById("open-cta");
      if (oc && vtxt("openCta")) oc.textContent = vtxt("openCta");
    })();

    // ---------- colour helpers (mirror the create page) ----------
    function shade(hex, pct) {
      const n = parseInt(String(hex).replace("#", ""), 16);
      let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      r = Math.round(Math.min(255, Math.max(0, r + 255 * pct)));
      g = Math.round(Math.min(255, Math.max(0, g + 255 * pct)));
      b = Math.round(Math.min(255, Math.max(0, b + 255 * pct)));
      return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }
    function faceBg(c) {
      const c1 = c.cardboard || "#6b4f33", c2 = c.cardboard2 || c1, a = c.angle ?? 135;
      if (c.finish === "holo") {
        const holo = "linear-gradient(125deg,#bfa9ff 0%,#ffc6e9 30%,#b8f0ff 60%,#cdbcff 100%)";
        const tint = (al) => `linear-gradient(rgba(0,0,0,${al}),rgba(0,0,0,${al}))`;
        return { front: holo, side2: `${tint(0.2)}, ${holo}`, top: `${tint(0.02)}, ${holo}`, dark: `${tint(0.4)}, ${holo}`, size: "300% 300%" };
      }
      if (c.finish === "gradient") {
        const g = (x, y) => `linear-gradient(${a}deg, ${x}, ${y})`;
        return { front: g(c1, c2), side2: g(shade(c1, 0.05), shade(c2, 0.05)), top: g(shade(c1, 0.12), shade(c2, 0.12)), dark: g(shade(c1, -0.12), shade(c2, -0.12)), size: "auto" };
      }
      return { front: c1, side2: shade(c1, 0.05), top: shade(c1, 0.12), dark: shade(c1, -0.08), size: "auto" };
    }
    function logoUrl(t) { return `https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/${String(t).toLowerCase()}.svg`; }
    function makeCoin(it, cls) {
      const span = document.createElement("span");
      span.className = cls || "coin";
      const fallback = () => { span.classList.add("no-logo"); span.style.background = `radial-gradient(circle at 30% 25%, rgba(255,255,255,0.4), transparent 55%), ${it.color || "#888"}`; span.textContent = it.glyph || (it.ticker ? it.ticker[0] : "•"); };
      if (it.glyph || !it.ticker) { fallback(); return span; }
      const img = document.createElement("img"); img.src = logoUrl(it.ticker); img.alt = ""; img.loading = "lazy";
      img.addEventListener("error", () => { span.innerHTML = ""; fallback(); });
      span.appendChild(img); return span;
    }

    // ---------- paint the cube + fill the info panel ----------
    // Render the box via the shared engine — it migrates the legacy design+items
    // into a box document, clears #scene, and injects the 3D box (per-face layers)
    // plus the open-reveal burst (assets fly out on open).
    // Template gifts (d.tp from the wrap "Box designs" gallery) rebuild the
    // designed box as a full engine doc; everything else takes the legacy
    // pattern-box migration path.
    const tplDoc = (design.tp && window.GIIIFTBoxTemplates)
      ? GIIIFTBoxTemplates.doc(design.tp, {
          c1: design.cardboard, c2: design.cardboard2, accent: design.accent,
          to: String(design.labelTo || gift.to || "").replace(/^to:\s*/i, "").trim(),
          from: design.from || gift.from, note: design.note || gift.msg,
          title: String(design.brand || "").trim(),   // the sender's Front text survives the template
        })
      : null;
    const engine = GIIIFTBox.render(
      document.getElementById("scene"),
      tplDoc || GIIIFTBox.fromLegacy(Object.assign({}, design, { items: items, to: gift.to, msg: gift.msg, from: design.from || gift.from })),
      { mode: "view", burst: false }   // assets float ABOVE the box (below), not popping on its face
    );
    const box = engine.box;

    // info panel
    document.getElementById("from-name").textContent = gift.from || design.from || "a friend";
    document.getElementById("to-name").textContent = String(design.labelTo || gift.to || "you").replace(/^to:\s*/i, "").trim() || "you";
    const noteCard = document.getElementById("gift-note");
    const giftMsg = design.note || gift.msg || "";
    if (giftMsg) { document.getElementById("note-text").textContent = giftMsg; noteCard.hidden = false; } else { noteCard.hidden = true; }

    const cList = document.getElementById("c-list");
    const aboveIcons = document.getElementById("above-icons");
    (items.length ? items : []).forEach((it, i) => {
      const row = document.createElement("div"); row.className = "c-row"; row.style.animationDelay = (i * 0.1) + "s";
      row.appendChild(makeCoin(it, "coin"));
      const meta = document.createElement("div"); meta.className = "c-meta";
      meta.innerHTML = `<div class="c-amt"></div><div class="c-name"></div>`;
      meta.querySelector(".c-amt").textContent = `${it.amount || ""} ${it.ticker || ""}`.trim();
      meta.querySelector(".c-name").textContent = it.name || "";
      row.appendChild(meta);
      const usd = document.createElement("div"); usd.className = "c-usd"; row.appendChild(usd);
      cList.appendChild(row);
      // the matching piece that rises out of the box on open — the THING the asset is
      // (digital card / art frame / booster pack via asset-visuals.js; disc fallback)
      if (aboveIcons) {
        const AV = window.GIIIFTAssetVisuals;
        let node;
        if (AV) {
          node = document.createElement("span");
          node.className = "above-rise";
          node.style.setProperty("--ai-rot", [-4, 2.5, -2, 3.5][i % 4] + "deg");
          node.appendChild(AV.build(it, { logo: it.ticker ? logoUrl(it.ticker) : null }));
        } else {
          node = makeCoin(it, "above-coin");
        }
        node.style.setProperty("--ai-delay", (i * 0.14) + "s");
        aboveIcons.appendChild(node);
      }
    });

    // ---------- claim: embedded wallet identity + write to the vault store ----------
    // GIIIFT is a static app, so the "vault" is localStorage that /me (me.html)
    // reads. Claiming (1) gives the recipient a persistent wallet identity with
    // no signup, and (2) appends one claim record per asset to `giiift-claims`,
    // matching the schema me.html renders. Idempotent per gift link.
    const PROFILE_KEY = "giiift-profile";
    const CLAIMS_KEY  = "giiift-claims";
    const CLAIMED_KEY = "giiift-claimed";   // gift-link hashes already claimed (dedupe)
    const WALLET_KEY  = "giiift-wallet";
    const readJson  = (k, f) => { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch { return f; } };
    const writeJson = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    // stable, non-crypto hash of the gift link so a link only claims once
    function hashToken(str) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      return h.toString(36);
    }
    const giftKey = token ? hashToken(token) : (INTENT ? "intent-" + INTENT.id : "demo");

    // per-ticker display + routing metadata (best-effort; vault shows icon + network)
    const ICONS    = { BTC:"₿", ETH:"Ξ", SOL:"◎", USDC:"$", USDT:"$", DAI:"$", XRP:"✕", BNB:"⬨", LTC:"Ł", DOGE:"Ð", ADA:"₳", DOT:"●", AVAX:"▲", MATIC:"⬡", LINK:"⬡", TRX:"▣", UNI:"❍", ATOM:"⚛", XLM:"✦", ZEC:"ⓩ", XMR:"ɱ", NEAR:"Ⓝ", APT:"◈", ARB:"◆", OP:"⬤", SHIB:"✦", PEPE:"✦" };
    const NETWORKS = { BTC:"Bitcoin", ETH:"Ethereum", SOL:"Solana", USDC:"Base", USDT:"Ethereum", DAI:"Ethereum", XRP:"XRP Ledger", BNB:"BNB Chain", LTC:"Litecoin", DOGE:"Dogecoin", ADA:"Cardano", DOT:"Polkadot", AVAX:"Avalanche", MATIC:"Polygon", LINK:"Ethereum", TRX:"TRON", UNI:"Ethereum", ATOM:"Cosmos", XLM:"Stellar", ZEC:"Zcash", XMR:"Monero", NEAR:"NEAR", APT:"Aptos", ARB:"Arbitrum", OP:"Optimism", SHIB:"Ethereum", PEPE:"Ethereum" };
    const CG_IDS   = { BTC:"bitcoin", ETH:"ethereum", SOL:"solana", USDC:"usd-coin", USDT:"tether", DAI:"dai", XRP:"ripple", BNB:"binancecoin", LTC:"litecoin", DOGE:"dogecoin", ADA:"cardano", DOT:"polkadot", AVAX:"avalanche-2", MATIC:"matic-network", LINK:"chainlink", TRX:"tron", UNI:"uniswap", ATOM:"cosmos", XLM:"stellar", ZEC:"zcash", XMR:"monero", NEAR:"near", APT:"aptos", ARB:"arbitrum", OP:"optimism", SHIB:"shiba-inu", PEPE:"pepe" };
    const iconFor    = t => ICONS[String(t || "").toUpperCase()] || (t ? String(t)[0].toUpperCase() : "$");
    const networkFor = t => NETWORKS[String(t || "").toUpperCase()] || "";

    // Best-effort live USD pricing (CoinGecko - keyless + CORS). Kicked off on
    // load so prices are usually ready by the time they tap Open. Any failure
    // falls back to unknown (usd "-", usdNum 0), which the vault renders fine.
    const pricePromise = (async () => {
      const ids = [...new Set(items.map(it => CG_IDS[String(it.ticker || "").toUpperCase()]).filter(Boolean))];
      if (!ids.length) return {};
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 3000);
        const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=usd`, { signal: ctrl.signal });
        clearTimeout(timer);
        return r.ok ? await r.json() : {};
      } catch { return {}; }
    })();
    function fmtUsd(n) {
      if (!isFinite(n) || n <= 0) return { usd: "-", usdNum: 0 };
      const usd = n >= 1 ? n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 })
                         : "$" + n.toFixed(n >= 0.01 ? 4 : 6);
      return { usd, usdNum: Math.round(n * 100) / 100 };
    }

    // fill each manifest card's USD value once live prices land (best-effort)
    pricePromise.then((prices) => {
      const rows = document.querySelectorAll("#c-list .c-row");
      items.forEach((it, i) => {
        const usdEl = rows[i] && rows[i].querySelector(".c-usd"); if (!usdEl) return;
        const px = prices[CG_IDS[String(it.ticker || "").toUpperCase()]]?.usd;
        const amt = parseFloat(String(it.amount).replace(/,/g, ""));
        if (px && isFinite(amt)) usdEl.textContent = fmtUsd(amt * px).usd;
      });
    }).catch(() => {});

    // ---------- polaroid photos (sender-attached) → pinned prints NEXT TO the box ----------
    // design.ph is a localStorage key (same-device demo) or a baked array of URLs.
    // Slots fan down the box's left side in --rev-box units (the rail owns the right);
    // below 735px the CSS turns the scatter into an in-column row and zeroes the offsets.
    const photoScatter = document.getElementById("photo-scatter");
    (function mountPolaroids() {
      if (!photoScatter) return;
      let photos = [];
      if (Array.isArray(design.ph)) photos = design.ph;
      else if (design.ph) {
        const arr = readJson("giiift-photos:" + design.ph, []);
        if (Array.isArray(arr)) photos = arr.filter(u => typeof u === "string" && u.startsWith("data:image/"));
      }
      photos = photos.slice(0, 3);
      if (!photos.length) return;
      const SLOTS = [   // [x, y] in --rev-box units from the box centre, plus the settle tilt
        { x: -1.32, y: -0.52, rot: "-7deg" },
        { x: -1.52, y: 0.14, rot: "4deg" },
        { x: -1.20, y: 0.72, rot: "-3deg" },
      ];
      photos.forEach((src, i) => {
        const s = SLOTS[i % SLOTS.length];
        const f = document.createElement("figure");
        f.className = "photo-pol";
        f.style.setProperty("--pp-x", "calc(var(--rev-box) * " + s.x + ")");
        f.style.setProperty("--pp-y", "calc(var(--rev-box) * " + s.y + ")");
        f.style.setProperty("--pp-rot", s.rot);
        f.style.setProperty("--pp-delay", (0.12 + i * 0.16) + "s");
        const pin = document.createElement("span"); pin.className = "pp-pin"; f.appendChild(pin);
        const img = document.createElement("img");
        img.src = src; img.alt = ""; img.loading = "lazy";
        f.appendChild(img);
        photoScatter.appendChild(f);
      });
      photoScatter.hidden = false;
    })();

    // Embedded wallet - created silently, no signup. Real key custody arrives
    // with Privy (see netlify.toml); today this is the recipient's persistent
    // GIIIFT address that the vault displays. Reused once it exists.
    const AVATARS = ["#FF3B6F", "#FFD93D", "#4ECDC4", "#9945FF", "#00FF9D", "#FF6B6B"];
    function getOrCreateWallet() {
      let profile = readJson(PROFILE_KEY, null);
      if (profile && profile.address) return profile;
      const bytes = crypto.getRandomValues(new Uint8Array(20));
      const address = "0x" + [...bytes].map(b => b.toString(16).padStart(2, "0")).join("");
      const rawName = String(design.labelTo || gift.to || "").replace(/^to:\s*/i, "").trim();
      const name = rawName && !/^you$/i.test(rawName) ? rawName : "You";
      profile = {
        id: "user-" + giftKey,
        name,
        handle: (name.toLowerCase().replace(/[^a-z0-9]+/g, "") || "you").slice(0, 20),
        email: "",
        address,
        createdAt: Date.now(),
        avatarColor: AVATARS[Math.floor(Math.random() * AVATARS.length)],
        totalsHidden: false,
      };
      writeJson(PROFILE_KEY, profile);
      writeJson(WALLET_KEY, { address, provider: "giiift-embedded-preview", createdAt: profile.createdAt });
      return profile;
    }

    // gift items -> vault claim records (one per asset), priced best-effort
    async function buildClaims() {
      const prices = await pricePromise;
      const now = Date.now();
      return items.map((it, i) => {
        const sym = String(it.ticker || "").toUpperCase();
        const isNft = !!it.glyph;
        const px = prices[CG_IDS[sym]]?.usd;
        const amtNum = parseFloat(String(it.amount).replace(/,/g, ""));
        const { usd, usdNum } = (px && isFinite(amtNum)) ? fmtUsd(amtNum * px) : { usd: "-", usdNum: 0 };
        return {
          id: `claim-${giftKey}-${i}`,
          claimedAt: now,
          from: gift.from || design.from || "a friend",
          shape: "wrapped",
          note: design.note || "",
          asset: {
            type: isNft ? "nft" : "coin",
            symbol: it.ticker || "",
            name: it.name || it.ticker || "Asset",
            icon: isNft ? (it.glyph || "✦") : iconFor(it.ticker),
            color: it.color || "#888",
            amount: it.amount != null ? String(it.amount) : "",
            usd, usdNum,
            network: networkFor(it.ticker),
          },
          status: "active",
        };
      });
    }

    const isClaimed = () => readJson(CLAIMED_KEY, []).includes(giftKey);

    async function claimGift() {
      if (isClaimed()) return { alreadyClaimed: true };
      getOrCreateWallet();
      const fresh = await buildClaims();
      const existing = readJson(CLAIMS_KEY, []);
      const have = new Set(existing.map(c => c.id));
      writeJson(CLAIMS_KEY, existing.concat(fresh.filter(c => !have.has(c.id))));
      const claimed = readJson(CLAIMED_KEY, []);
      if (!claimed.includes(giftKey)) { claimed.push(giftKey); writeJson(CLAIMED_KEY, claimed); }
      // Stash gift context so /shop can open on a personalized lane
      // ("$X · from Mom → here's what it becomes"). Cheat code for discovery.
      const total = fresh.reduce((s, c) => s + ((c.asset && c.asset.usdNum) || 0), 0);
      try {
        const rawName = String(design.labelTo || gift.to || "").replace(/^to:\s*/i, "").trim();
        writeJson("giiift-shop-context", {
          to: rawName && !/^you$/i.test(rawName) ? rawName : "",
          from: (gift.from || design.from || "").replace(/^from:\s*/i, "").trim(),
          occasion: gift.o || "",
          amt: Math.round(total),
          // the funnel follows them into the shop: /shop reads this and themes itself
          vertical: (V && V.id() !== "core") ? V.id() : "",
        });
      } catch (e) {}
      return { alreadyClaimed: false, count: fresh.length, total: Math.round(total) };
    }

    // ---------- open the gift ----------
    const cta = document.getElementById("open-cta");
    const stage = document.getElementById("stage");
    let opened = false;

    // returning recipient: link already claimed -> point them at the vault
    if (isClaimed()) cta.textContent = vtxt("viewVaultCta", null, "View in your vault →");

    async function openGift() {
      if (opened) return; opened = true;
      engine.open();          // lid opens (interior glow)
      // assets rise up and float ABOVE the box as it opens…
      const ai = document.getElementById("above-icons"); if (ai) ai.classList.add("show");
      // …then the pretty manifest of what's inside slides in below the note
      setTimeout(() => { const m = document.getElementById("manifest"); if (m) { m.hidden = false; m.classList.add("revealed"); } }, 650);
      // …and the sender's polaroids pop up pinned beside the box last
      setTimeout(() => { if (photoScatter && !photoScatter.hidden) photoScatter.classList.add("revealed"); }, 1000);
      // retail mandate (g.r): the customize card mounts under the manifest. Additive and
      // dark unless this payload carries one; it can never block or break the claim.
      if (gift.mandate && gift.mandate.productId && window.giiiftRetailClaimCard) {
        setTimeout(() => {
          const m = document.getElementById("manifest");
          if (m) window.giiiftRetailClaimCard({ productId: gift.mandate.productId, mount: m, from: (gift.from || "").replace(/^from:\s*/i, "").trim() });
        }, 1200);
      }
      stage.classList.add("can-drag");   // now that it's open, let them spin it
      cta.disabled = true;
      cta.textContent = isClaimed() ? vtxt("openingCta", null, "Opening…") : vtxt("claimingCta", null, "Claiming…");
      let res = { alreadyClaimed: false };
      try { res = await claimGift(); }
      catch (e) { console.error("[GIIIFT] claim failed:", e); }
      // invitation links: record the open on the intent spine (audit + the sender's record)
      if (INTENT && INTENT.you_claimed && window.GIIIFTIntent) {
        window.GIIIFTIntent.opened(INTENT.id);
        if (window.giiift && window.giiift.track) window.giiift.track("intent_opened", {});
      }
      cta.disabled = false;
      /* public showcase mirror: the demo ends at the reveal — no vault claim,
         no spend funnel, no reciprocity loop (those live on the real product) */
      cta.style.display = "none";
      return;
      // The received value isn't a dead-end: offer to spend it right away.
      if (!document.getElementById("spend-now")) {
        const sp = document.createElement("a");
        sp.id = "spend-now";
        sp.href = "/showcase/shop.html";
        sp.textContent = res.total
          ? vtxt("spendCta", { amount: "$" + res.total.toLocaleString("en-US") }, `Spend your $${res.total.toLocaleString("en-US")} →`)
          : vtxt("spendCtaZero", null, "Spend it now →");
        sp.style.cssText = "display:block;margin-top:10.5px;text-align:center;font-family:inherit;font-weight:600;font-size:10.5px;color:var(--accent-ui,#00FF9D);text-decoration:none;";
        sp.onmouseenter = () => { sp.style.textDecoration = "underline"; };
        sp.onmouseleave = () => { sp.style.textDecoration = "none"; };
        cta.insertAdjacentElement("afterend", sp);
        renderAfterClaim(sp, res);
      }
    }

    // ---------- post-claim funnel content: trust line, "what it becomes", reciprocity ----------
    // All three render from the active vertical's config (and degrade to core copy),
    // so a /tcg pack pitches three affordable cards while a plain gift stays generic.
    function renderAfterClaim(anchor, res) {
      const st = document.createElement("style");
      st.textContent =
        ".rv-trust{margin-top:6px;text-align:center;font-size:8.3px;color:rgba(243,244,242,0.42);letter-spacing:0.02em}" +
        ".rv-becomes{margin:15px auto 0;max-width:390px;text-align:left}" +
        ".rv-becomes .bc-title{font-family:var(--font-mono,monospace);font-size:9.8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-ui,#00FF9D);text-align:center}" +
        ".rv-becomes .bc-note{font-size:8.3px;color:rgba(243,244,242,0.38);text-align:center;margin-top:2.3px}" +
        ".rv-becomes .bc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6.8px;margin-top:9px}" +
        ".rv-item{display:block;text-decoration:none;border:1px solid rgba(255,255,255,0.1);border-radius:9.8px;padding:8.3px 7.5px;background:linear-gradient(180deg,rgba(255,255,255,0.045),rgba(255,255,255,0.012));transition:transform .16s,border-color .2s;text-align:center}" +
        ".rv-item:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.24)}" +
        ".rv-item .ri-e{font-size:18px}" +
        ".rv-item .ri-t{font-weight:700;font-size:8.6px;color:var(--ink,#f3f4f2);margin-top:4.5px;line-height:1.25}" +
        ".rv-item .ri-p{font-family:var(--font-mono,monospace);font-size:10.5px;color:var(--accent-ui,#00FF9D);margin-top:3.8px}" +
        ".rv-recip{display:block;margin-top:12px;text-align:center;font-weight:600;font-size:9.8px;color:rgba(243,244,242,0.6);text-decoration:none}" +
        ".rv-recip:hover{color:var(--ink,#f3f4f2)}" +
        "@media (max-width:420px){.rv-becomes .bc-row{grid-template-columns:repeat(2,1fr)}}";
      document.head.appendChild(st);

      let tail = anchor;

      // trust microcopy at the money moment ("Vaulted & insured · redeem-to-ship…")
      const trust = vtxt("trustLine");
      if (trust) {
        const t = document.createElement("div");
        t.className = "rv-trust";
        t.textContent = trust;
        tail.insertAdjacentElement("afterend", t);
        tail = t;
      }

      // "what your credit becomes": three affordable items, vertical games first
      const catalog = (window.GIIIFT_CATALOG || []).slice();
      if (catalog.length) {
        const budget = res.total > 0 ? res.total : 50;
        let picks = catalog.filter(it => it.priceUSD <= budget);
        if (!picks.length) picks = catalog.slice().sort((a, b) => a.priceUSD - b.priceUSD);
        picks = (V ? V.boostItems(picks) : picks).slice(0, 3);
        if (picks.length) {
          const amount = "$" + (res.total > 0 ? res.total.toLocaleString("en-US") : budget);
          const box = document.createElement("div");
          box.className = "rv-becomes";
          const title = document.createElement("div");
          title.className = "bc-title";
          title.textContent = vtxt("becomesTitle", { amount }, `Your ${amount} → what it becomes`);
          box.appendChild(title);
          const note = vtxt("becomesNote");
          if (note) { const n = document.createElement("div"); n.className = "bc-note"; n.textContent = note; box.appendChild(n); }
          const row = document.createElement("div");
          row.className = "bc-row";
          picks.forEach(it => {
            const a = document.createElement("a");
            a.className = "rv-item";
            a.href = V ? V.link("/showcase/shop.html") : "/showcase/shop.html";
            const e = document.createElement("div"); e.className = "ri-e"; e.textContent = it.emoji || "🎁";
            const t = document.createElement("div"); t.className = "ri-t"; t.textContent = it.title;
            const p = document.createElement("div"); p.className = "ri-p"; p.textContent = "$" + Math.round(it.priceUSD).toLocaleString("en-US");
            a.append(e, t, p);
            row.appendChild(a);
          });
          box.appendChild(row);
          tail.insertAdjacentElement("afterend", box);
          tail = box;
        }
      }

      // reciprocity: the highest-leverage loop ("Rip one back for Misty →").
      // The link carries ?via=<code> so the K lineage survives a device hop:
      // the reply gift records THIS gift as its parent even on a new browser.
      const sender = (gift.from || design.from || "").replace(/^from:\s*/i, "").trim();
      if (sender) {
        const r = document.createElement("a");
        r.className = "rv-recip";
        r.textContent = vtxt("reciprocityCta", { from: sender }, `Send one back to ${sender} →`);
        const base = V ? V.link("/showcase/wrap.html") : "/showcase/wrap.html";
        const sep = base.indexOf("?") === -1 ? "?" : "&";
        const viaCode = /^[A-Za-z0-9_-]{3,20}$/.test(token) ? token : "";
        r.href = base + sep + "to=" + encodeURIComponent(sender.slice(0, 18))
          + (res.total > 0 ? "&pack=" + res.total : "")
          + (viaCode ? "&via=" + encodeURIComponent(viaCode) : "");
        tail.insertAdjacentElement("afterend", r);
      }
    }
    // Invitation links route the tap through the handshake first; everything else opens directly.
    const tapOpen = () => { if (intentGate()) return; openGift(); };
    cta.addEventListener("click", tapOpen);
    box.addEventListener("click", tapOpen);

    // ---------- invitation (intent) flow: claim + waiting room (link-gifting M1) ----------
    // The link carries no funds and no claim right. States:
    //   created                  -> tap = sign in + knock (optional "tell them it's you" note)
    //   claim_requested (yours)  -> waiting room: sender notified, nudge 1/24h, poll for the hand-over
    //   claim_requested (other)  -> "someone's claiming this" (+ "it's me" re-login)
    //   funded / opened (yours)  -> normal open flow (full payload arrived with your Bearer)
    //   funded / opened (other)  -> "found its person" (+ "it's me")
    //   expired / cancelled      -> resting state
    // On funded we RELOAD: the authed GET then returns the full payload and this
    // page boots straight into the standard openable-gift flow above.
    let consumeTap = null;
    function intentGate() { return consumeTap ? (consumeTap(), true) : false; }
    (function intentMode() {
      if (intentMissing) { cta.disabled = true; cta.textContent = "This invitation wasn't found"; return; }
      if (!INTENT) return;
      const IC = window.GIIIFTIntent;
      const senderName = (INTENT.sender_name || (gift.from || "").replace(/^from:\s*/i, "").trim() || "the sender");
      // M2 claim lock: the redacted GET exposes the lock target (the refusal copy
      // needs it, spec §4) and the sign-in pre-selects the matching provider.
      const LOCK_METHODS = { email: "email", twitter: "twitter", discord: "discord", telegram: "telegram", farcaster: "farcaster" };
      const lockType = INTENT.restriction_type || "";
      const lockValue = INTENT.restriction_value || "";
      const lockLabel = !lockType ? ""
        : lockType === "twitter" ? "@" + lockValue + " on X"
        : lockType === "discord" ? lockValue + " on Discord"
        : lockType === "email" ? lockValue
        : lockValue + " on " + lockType;
      const loginOpts = LOCK_METHODS[lockType] ? { loginMethods: [LOCK_METHODS[lockType]] } : undefined;

      const st = document.createElement("style");
      st.textContent =
        ".intent-room{margin-top:10.5px;max-width:285px;background:rgba(13,17,21,0.66);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 13.5px;-webkit-backdrop-filter:blur(6.8px);backdrop-filter:blur(6.8px);box-shadow:0 9px 21px rgba(0,0,0,0.45);text-align:left}" +
        ".intent-room .ir-eyebrow{font-family:var(--font-mono,monospace);font-size:8.3px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-ui,#00FF9D)}" +
        ".intent-room .ir-h{font-weight:700;font-size:11.3px;color:#fff;margin-top:5.3px;line-height:1.35}" +
        ".intent-room .ir-sub{font-size:9.4px;line-height:1.55;color:rgba(243,244,242,0.6);margin-top:4.5px}" +
        ".intent-room .ir-note{width:100%;margin-top:7.5px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:7.5px;padding:6.8px 8.3px;font:inherit;font-size:9.8px;color:#fff;outline:none}" +
        ".intent-room .ir-note::placeholder{color:rgba(243,244,242,0.35)}" +
        ".intent-room .ir-btn{display:block;width:100%;margin-top:8.3px;background:var(--accent-ui,#00FF9D);color:#04130c;font-weight:700;font-size:10.5px;border:none;border-radius:8.3px;padding:8.3px 10.5px;cursor:pointer}" +
        ".intent-room .ir-btn[disabled]{opacity:0.55;cursor:default}" +
        ".intent-room .ir-ghost{display:block;width:100%;margin-top:6px;background:transparent;color:rgba(243,244,242,0.65);font-weight:600;font-size:9.4px;border:1px solid rgba(255,255,255,0.16);border-radius:8.3px;padding:6.8px 10.5px;cursor:pointer}" +
        ".intent-room .ir-demo{font-size:8.3px;color:rgba(243,244,242,0.38);margin-top:6.8px;line-height:1.5}" +
        ".intent-itsme{display:block;margin-top:7.5px;font-size:9.4px;font-weight:600;color:var(--accent-ui,#00FF9D);background:none;border:none;cursor:pointer;text-decoration:underline}";
      document.head.appendChild(st);

      let room = null;
      function panel(innerHtml) {
        if (!room) { room = document.createElement("div"); room.className = "intent-room"; cta.insertAdjacentElement("afterend", room); }
        room.innerHTML = innerHtml;
        return room;
      }
      const deadline = () => { try { return new Date(INTENT.expires_at).toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" }); } catch (e) { return "soon"; } };
      const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      function itsMeButton(host) {
        const b = document.createElement("button");
        b.type = "button"; b.className = "intent-itsme"; b.textContent = "It's me — sign in →";
        b.onclick = async () => { b.textContent = "Opening sign-in…"; const ok = await IC.ensureLogin(0, loginOpts); if (ok) location.reload(); else b.textContent = "It's me — sign in →"; };
        host.insertAdjacentElement("afterend", b);
      }

      let polling = null;
      function poll() {
        if (polling) return;
        polling = setInterval(async () => {
          const r = await IC.get(INTENT.id);
          if (!r.ok || !r.data) return;
          if (r.data.status === "funded" || r.data.status === "opened") {
            clearInterval(polling);
            panel('<div class="ir-eyebrow">Handshake</div>' +
              '<div class="ir-h">🎁 ' + esc(senderName) + ' handed it over!</div>' +
              '<div class="ir-sub">Unwrapping…</div>');
            setTimeout(() => location.reload(), 1400);
          } else if (r.data.status === "created" && r.data.you_claimed === false) {
            // sender rejected this claim: the slot reopened
            clearInterval(polling); polling = null;
            INTENT = r.data;
            cta.hidden = false;
            panel('<div class="ir-eyebrow">Handshake</div>' +
              '<div class="ir-h">' + esc(senderName) + " couldn't confirm it was you.</div>" +
              '<div class="ir-sub">You can knock again, or check with them directly.</div>');
            showKnock();
          }
        }, 6000);
      }

      function showWaiting() {
        cta.hidden = true;
        const p = panel('<div class="ir-eyebrow">Handshake</div>' +
          '<div class="ir-h">' + esc(senderName) + " is being told you're here.</div>" +
          '<div class="ir-sub">They have until <b>' + esc(deadline()) + '</b> to hand it over. The unwrap starts the moment they do — keep this page open or come back anytime.</div>' +
          '<button type="button" class="ir-ghost" id="ir-nudge">Send a gentle reminder</button>' +
          '<div class="ir-demo">Invitation links are in preview: the hand-over delivers the box and note.</div>');
        const nb = p.querySelector("#ir-nudge");
        if (nb) nb.onclick = async () => {
          nb.disabled = true; nb.textContent = "Reminding…";
          const r = await IC.nudge(INTENT.id);
          nb.textContent = r.ok ? "Reminder sent ✓" : (r.status === 429 ? "Already reminded today" : "Couldn't remind — try later");
        };
        poll();
      }

      function showKnock() {
        consumeTap = async () => {
          consumeTap = null;
          cta.disabled = true; cta.textContent = "Waiting for sign-in…";
          const ok = await IC.ensureLogin(0, loginOpts);
          if (!ok) { cta.disabled = false; cta.textContent = "Sign in to open →"; return showKnock(); }
          cta.hidden = true;
          const p = panel('<div class="ir-eyebrow">Handshake</div>' +
            '<div class="ir-h">Let ' + esc(senderName) + ' know you\'re here</div>' +
            (lockType ? '<div class="ir-sub">🔒 Locked to <b>' + esc(lockLabel) + '</b> — we check that\'s the account you signed in with.</div>' : '') +
            '<div class="ir-sub">This gift hands over once they approve. Add a note so they know it\'s you.</div>' +
            '<input class="ir-note" id="ir-note" maxlength="200" placeholder="It\'s me — Sarah from league!">' +
            '<button type="button" class="ir-btn" id="ir-claim">Request this gift →</button>');
          const btn = p.querySelector("#ir-claim");
          btn.onclick = async () => {
            btn.disabled = true; btn.textContent = "Knocking…";
            const note = (p.querySelector("#ir-note") || {}).value || "";
            const r = await IC.claim(INTENT.id, { note: note.trim() || undefined, claimant_wallet: window.giiiftWalletAddress || undefined });
            if (r.ok) {
              if (window.giiift && window.giiift.track) window.giiift.track("claim_requested", { restricted_match: !!lockType });
              INTENT.status = "claim_requested"; INTENT.you_claimed = true;
              showWaiting();
            } else if (r.status === 409) {
              const g = await IC.get(INTENT.id); if (g.ok && g.data) { INTENT = g.data; }
              if (INTENT.you_claimed) showWaiting();
              else { panel('<div class="ir-eyebrow">Handshake</div><div class="ir-h">Someone else just knocked.</div><div class="ir-sub">' + esc(senderName) + ' is deciding who this gift is for.</div>'); }
            } else if (r.status === 403 && r.data && r.data.error === "restricted") {
              // the verified account doesn't match the lock (spec §4 refusal state)
              const p2 = panel('<div class="ir-eyebrow">Handshake</div>' +
                '<div class="ir-h">This gift is for ' + esc(lockLabel || r.data.restriction_value || "someone else") + '.</div>' +
                '<div class="ir-sub">' + (r.data.you ? 'You\'re signed in as <b>' + esc(r.data.you) + '</b>. ' : '') + 'If that\'s you on another account, switch and knock again.</div>' +
                '<button type="button" class="ir-btn" id="ir-switch">Switch account →</button>');
              const sw = p2.querySelector("#ir-switch");
              if (sw) sw.onclick = async () => {
                sw.disabled = true; sw.textContent = "Signing out…";
                try { if (window.giiiftLogout) await window.giiiftLogout(); } catch (e2) {}
                location.reload();
              };
            } else {
              btn.disabled = false; btn.textContent = "Try again →";
            }
          };
        };
      }

      function showResting(msg, withItsMe) {
        cta.disabled = true; cta.textContent = msg;
        consumeTap = () => {};
        if (withItsMe) itsMeButton(cta);
      }

      // dispatch on the loaded status
      switch (INTENT.status) {
        case "created":
          // restricted invitations say who they're for up front, so the right
          // person picks the right account before knocking
          if (lockType) {
            panel('<div class="ir-eyebrow">Invitation</div>' +
              '<div class="ir-h">🔒 For ' + esc(lockLabel) + '</div>' +
              '<div class="ir-sub">Sign in with that account to knock — we verify it matches before ' + esc(senderName) + ' hears about it.</div>');
          }
          showKnock();
          break;
        case "claim_requested":
          if (INTENT.you_claimed) { consumeTap = () => {}; showWaiting(); }
          else showResting("Someone's claiming this gift…", true);
          break;
        case "funded":
        case "opened":
          // the verified claimant falls through to the normal open flow (full payload)
          if (!INTENT.you_claimed) showResting("This gift found its person 🎁", true);
          break;
        case "expired":
          showResting("This invitation has expired");
          break;
        case "cancelled":
          showResting("This invitation was withdrawn");
          break;
      }
    })();

    // ---------- drag to rotate (only AFTER opening, so a tap reliably OPENS the box) ----------
    // Two guards keep this glitch-free: (1) a tap must not disturb the box at all, so the
    // dragging state (float-pause + transition-off) only engages past a small movement
    // threshold; (2) the start pose is decomposed from the box's CURRENT transform (the
    // engine sets its own opened pose), never a stale literal — otherwise the first moved
    // pixel snaps the box to a different rotation.
    let drag = null, rot = null;
    function poseFromBox() {
      try {
        const m = new DOMMatrix(getComputedStyle(box).transform);
        // for a rotateY(a) rotateX(b) transform: a = atan2(-m13, m11), b = atan2(-m32, m22)
        return { y: Math.atan2(-m.m13, m.m11) * 180 / Math.PI, x: Math.atan2(-m.m32, m.m22) * 180 / Math.PI };
      } catch (e) { return { y: -24, x: 13 }; }
    }
    stage.addEventListener("pointerdown", (e) => {
      if (!stage.classList.contains("can-drag")) return;
      drag = { x: e.clientX, y: e.clientY, live: false };
    });
    window.addEventListener("pointermove", (e) => {
      if (!drag) return;
      if (!drag.live) {
        if (Math.hypot(e.clientX - drag.x, e.clientY - drag.y) < 5) return;   // still a tap
        rot = rot || poseFromBox();   // first real drag continues from the box's own pose
        drag.live = true; drag.ry = rot.y; drag.rx = rot.x; drag.x = e.clientX; drag.y = e.clientY;
        stage.classList.add("dragging"); box.style.transition = "none";
      }
      rot.y = drag.ry + (e.clientX - drag.x) * 0.4;
      rot.x = Math.max(-30, Math.min(40, drag.rx - (e.clientY - drag.y) * 0.4));
      box.style.transform = `rotateY(${rot.y}deg) rotateX(${rot.x}deg)`;
    });
    function endDrag() {
      if (!drag) return;
      const live = drag.live; drag = null;
      if (live) { stage.classList.remove("dragging"); box.style.transition = ""; }
    }
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);   // touch drags can end in a scroll takeover

    // ---------- delivery intro: van arrives, drops the package, drives off ----------
    // Opposite of the send flow (which picks a package up). The borealis is tied to
    // the gift's own colours, mirroring the send page. Clicking the dropped package
    // reveals the box centre-stage.
    function startReceiveAurora(design) {
      const canvas = document.getElementById("ri-aurora");
      if (!canvas) return;
      const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      if (!gl) return;
      const vsSource = "attribute vec4 aVertexPosition; void main(){ gl_Position = aVertexPosition; }";
      const fsSource = `
        precision highp float;
        uniform vec2 u_resolution; uniform float u_time;
        uniform vec3 u_sky0; uniform vec3 u_sky1; uniform vec3 u_aurora1; uniform vec3 u_aurora2; uniform vec3 u_glow;
        float hash(float n){ return fract(sin(n)*1e4); }
        float hash(vec2 p){ return fract(1e4*sin(17.0*p.x+p.y*0.1)*(0.1+abs(sin(p.y*13.0+p.x)))); }
        float noise(vec3 x){ const vec3 step=vec3(110,241,171); vec3 i=floor(x); vec3 f=fract(x); float n=dot(i,step); vec3 u=f*f*(3.0-2.0*f);
          return mix(mix(mix(hash(n+dot(step,vec3(0,0,0))),hash(n+dot(step,vec3(1,0,0))),u.x),mix(hash(n+dot(step,vec3(0,1,0))),hash(n+dot(step,vec3(1,1,0))),u.x),u.y),
                     mix(mix(hash(n+dot(step,vec3(0,0,1))),hash(n+dot(step,vec3(1,0,1))),u.x),mix(hash(n+dot(step,vec3(0,1,1))),hash(n+dot(step,vec3(1,1,1))),u.x),u.y),u.z); }
        float fbm(vec3 p){ float f=0.0; float w=0.5; for(int i=0;i<5;i++){ f+=w*noise(p); p*=2.0; w*=0.5; } return f; }
        float grain(vec2 uv,float t){ float m=dot(uv,vec2(12.9898,78.233)); return fract(sin(m+t)*43758.5453)*0.15; }
        float makeStars(vec2 uv){ float n=hash(uv*200.0); float s=smoothstep(0.99,1.0,n); s*=(sin(u_time*2.0+n*100.0)*0.5+0.5); return s; }
        void main(){
          vec2 uv=gl_FragCoord.xy/u_resolution.xy; vec2 st=uv; st.x*=u_resolution.x/u_resolution.y;
          float t=u_time*0.15;
          vec3 skyColor=mix(u_sky0,u_sky1,uv.y); skyColor+=vec3(makeStars(st))*0.5;
          vec2 warp=st; warp.x+=sin(warp.y*3.0+t)*0.1; warp.y+=cos(warp.x*2.0-t*0.5)*0.1;
          vec3 p=vec3(warp.x*3.0,warp.y*0.5-t*0.8,t*0.5); float n1=fbm(p); float band1=smoothstep(0.2,0.7,n1);
          vec3 p2=vec3(warp.x*4.0-t,warp.y*0.6-t*1.2,t*0.7); float n2=fbm(p2); float band2=smoothstep(0.3,0.8,n2);
          vec3 auroraColor=mix(u_aurora1*0.3,u_aurora1,band1); auroraColor=mix(auroraColor,u_aurora2,band2*0.8);
          float hlMask=distance(uv,vec2(0.8,0.8)); hlMask=smoothstep(1.0,0.0,hlMask);
          auroraColor=mix(auroraColor,u_glow,hlMask*band1*0.6);
          float edge=smoothstep(0.6,0.8,n1)*smoothstep(0.8,0.6,n1); auroraColor+=u_glow*edge*0.5;
          float alphaMask=smoothstep(-0.2,0.8,uv.y)*0.8;
          vec3 finalColor=skyColor+(auroraColor*alphaMask);
          float vig=uv.x*uv.y*(1.0-uv.x)*(1.0-uv.y); vig=clamp(pow(16.0*vig,0.25),0.0,1.0); finalColor*=vig;
          finalColor+=vec3(grain(uv,u_time))*0.6; finalColor=smoothstep(0.0,1.0,finalColor);
          gl_FragColor=vec4(finalColor,1.0);
        }`;
      const mk = (type, src) => { const o = gl.createShader(type); gl.shaderSource(o, src); gl.compileShader(o); if (!gl.getShaderParameter(o, gl.COMPILE_STATUS)) { console.error("[GIIIFT receive aurora]", gl.getShaderInfoLog(o)); return null; } return o; };
      const vs = mk(gl.VERTEX_SHADER, vsSource), fs = mk(gl.FRAGMENT_SHADER, fsSource);
      if (!vs || !fs) return;
      const prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error("[GIIIFT receive aurora]", gl.getProgramInfoLog(prog)); return; }
      const lPos = gl.getAttribLocation(prog, "aVertexPosition");
      const lRes = gl.getUniformLocation(prog, "u_resolution"), lTime = gl.getUniformLocation(prog, "u_time");
      const lSky0 = gl.getUniformLocation(prog, "u_sky0"), lSky1 = gl.getUniformLocation(prog, "u_sky1");
      const lA1 = gl.getUniformLocation(prog, "u_aurora1"), lA2 = gl.getUniformLocation(prog, "u_aurora2"), lGlow = gl.getUniformLocation(prog, "u_glow");
      const hx = (h) => { h = String(h || "").replace("#", ""); if (h.length === 3) h = h.split("").map(c => c + c).join(""); const n = parseInt(h, 16) || 0; return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255]; };
      const scc = (c, f) => [Math.min(1, c[0] * f), Math.min(1, c[1] * f), Math.min(1, c[2] * f)];
      const mxc = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
      const c1 = hx(design.cardboard || "#7c3aed"), c2 = hx(design.cardboard2 || design.cardboard || "#ec4899"), ac = hx(design.accent || "#fde68a");
      const pal = { a1: c1, a2: c2, glow: ac, sky0: scc(c1, 0.12), sky1: scc(mxc(c1, c2, 0.5), 0.22) };
      const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf); gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, 1, 1, 1, -1, -1, 1, -1]), gl.STATIC_DRAW);
      const start = Date.now(), dpr = Math.min(window.devicePixelRatio || 1, 2);
      function frame() {
        const w = Math.round(canvas.clientWidth * dpr), h = Math.round(canvas.clientHeight * dpr);
        if (w && h && (canvas.width !== w || canvas.height !== h)) { canvas.width = w; canvas.height = h; gl.viewport(0, 0, w, h); }
        gl.useProgram(prog); gl.bindBuffer(gl.ARRAY_BUFFER, buf); gl.vertexAttribPointer(lPos, 2, gl.FLOAT, false, 0, 0); gl.enableVertexAttribArray(lPos);
        gl.uniform2f(lRes, canvas.width || 1, canvas.height || 1); gl.uniform1f(lTime, (Date.now() - start) / 1000.0);
        gl.uniform3f(lSky0, pal.sky0[0], pal.sky0[1], pal.sky0[2]); gl.uniform3f(lSky1, pal.sky1[0], pal.sky1[1], pal.sky1[2]);
        gl.uniform3f(lA1, pal.a1[0], pal.a1[1], pal.a1[2]); gl.uniform3f(lA2, pal.a2[0], pal.a2[1], pal.a2[2]); gl.uniform3f(lGlow, pal.glow[0], pal.glow[1], pal.glow[2]);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); requestAnimationFrame(frame);
      }
      frame();
    }

    (function runReceiveIntro() {
      const intro = document.getElementById("receive-intro");
      const sceneEl = document.getElementById("scene");
      if (!intro || !sceneEl) { if (sceneEl) sceneEl.classList.add("revealed"); return; }
      intro.dataset.wired = "1";

      // ephemeral opening line - dreamy per-character reveal (same as the send page):
      // each char blurs in (staggered) + gently floats, then the whole line fades as the van arrives.
      (function preludeReveal() {
        const host = document.getElementById("ri-prelude-text");
        const prelude = document.getElementById("ri-prelude");
        if (!host) return;
        const full = vtxt("prelude", null, "You have a delivery on its way…");
        const words = full.split(" ");
        let i = 0;
        words.forEach((word, wi) => {
          const w = document.createElement("span"); w.style.display = "inline-block"; w.style.whiteSpace = "nowrap";
          for (const ch of word) {
            const c = document.createElement("span"); c.className = "dream-char"; c.textContent = ch;
            const reveal = (i * 0.065) + (Math.sin(i * 0.5) * 0.05);   // organic, uneven ripple (matches the reference)
            c.style.animationDelay = reveal + "s";
            // each glyph rises in once and HOLDS — no post-reveal float/drift (reveal uses `forwards`)
            w.appendChild(c); i++;
          }
          host.appendChild(w);
          if (wi < words.length - 1) { const sp = document.createElement("span"); sp.innerHTML = "&nbsp;"; sp.style.display = "inline-block"; host.appendChild(sp); i++; }
        });
        // reveal + sine stagger finishes ~4.3s; brief linger, then fade while the van's at centre
        setTimeout(() => { if (prelude) prelude.classList.add("gone"); }, 6300);
      })();
      const c1 = design.cardboard || "#7c3aed", c2 = design.cardboard2 || c1, ac = design.accent || "#fde68a";
      intro.style.setProperty("--bor-bright", ac);
      // package colours on the intro too, so the van can wear them (stripe + lights)
      intro.style.setProperty("--pkg1", c1);
      intro.style.setProperty("--pkg2", c2);
      intro.style.setProperty("--pkg-accent", ac);
      const pkg = document.getElementById("ri-package");
      if (pkg) { pkg.style.setProperty("--pkg1", c1); pkg.style.setProperty("--pkg2", c2); pkg.style.setProperty("--pkg-accent", ac); }
      const status = document.getElementById("ri-status");
      let armed = false, revealed = false;
      function arm() { if (armed) return; armed = true; intro.classList.add("armed"); if (status) status.innerHTML = '<span class="pip"></span>' + vtxt("armedStatus", null, "Delivered · tap to open"); }
      function reveal() {
        if (revealed || !armed) return; revealed = true;
        sceneEl.classList.add("revealed");
        try { window.scrollTo(0, 0); } catch (e) {}
        intro.classList.add("gone");
        setTimeout(() => { intro.style.display = "none"; }, 750);
      }
      intro.addEventListener("click", reveal);
      if (pkg) pkg.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); reveal(); } });

      let reduce = false; try { reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
      let hasGL = false; try { const t = document.createElement("canvas"); hasGL = !!(t.getContext("webgl") || t.getContext("experimental-webgl")); } catch (e) {}
      if (hasGL && !reduce) startReceiveAurora(design);
      // arm once the van has set the package down (delay 2.4s, then drive ≈ 7s)
      setTimeout(arm, reduce ? 200 : 7800);
    })();
  </script>

  <!-- Safety net: if the module above fails to run, the delivery intro must still
       be dismissible. Arms + wires click-to-reveal only if the module didn't. -->
  <script>
    (function () {
      setTimeout(function () {
        var intro = document.getElementById("receive-intro");
        if (!intro || intro.dataset.wired === "1" || intro.classList.contains("gone")) return;
        var scene = document.getElementById("scene");
        intro.classList.add("armed");
        intro.addEventListener("click", function () {
          if (scene) scene.classList.add("revealed");
          intro.classList.add("gone");
          setTimeout(function () { intro.style.display = "none"; }, 750);
        });
      }, 6000);
    })();
  </script>
</body>
</html>
