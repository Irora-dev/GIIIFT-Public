  <style>
    :root {
      --bg: #0b0d0c; --bg-2: #131715; --panel: #16191b; --panel-2: #1d2123;
      --line: rgba(255,255,255,0.10); --line-strong: rgba(255,255,255,0.22);
      --ink: #f3f4f2; --muted: rgba(243,244,242,0.55); --muted-2: rgba(243,244,242,0.38);
      --accent-ui: #00FF9D;
      --font-main: 'Inter', sans-serif; --font-serif: 'EB Garamond', serif;
      --font-mono: 'VT323', monospace; --font-logo: 'Bowlby One', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(825px 540px at 12% -8%, hsla(162,85%,55%,0.16), transparent 60%),
        radial-gradient(750px 600px at 92% 8%, hsla(212,88%,58%,0.18), transparent 62%),
        radial-gradient(900px 675px at 50% 116%, hsla(264,80%,60%,0.15), transparent 60%),
        var(--bg);
      color: var(--ink); font-family: var(--font-main); min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    /* iOS Safari ignores body-level overflow-x; the 3D box flaps extend the
       scrollable width on landscape phones without this (desktop unaffected) */
    html { overflow-x: clip; }
    a { color: inherit; }
    .studio-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px; mask-image: radial-gradient(circle at 60% 40%, #000 0%, transparent 75%); }
    .noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

    .nav-logo { position: fixed; top: 15px; left: 18px; z-index: 60; font-family: var(--font-logo); font-size: 16.5px; letter-spacing: -0.04em; color: var(--ink); text-decoration: none; transform: rotate(-3deg); display: inline-flex; align-items: baseline; gap: 1px; }
    .nav-logo .i-1 { color: #FF3B6F; } .nav-logo .i-2 { color: #FFD93D; } .nav-logo .i-3 { color: #4ECDC4; }
    .nav-logo .dot { width: 6px; height: 6px; background: var(--ink); border-radius: 50%; transform: translateY(-2px); margin-left: 2.3px; }
    .nav-vault { position: fixed; top: 16.5px; right: 18px; z-index: 60; font-size: 9px; font-weight: 600; text-decoration: none; color: var(--muted); padding: 6px 10.5px; border: 1px solid var(--line); border-radius: 74px; background: rgba(255,255,255,0.03); transition: color .2s, border-color .2s; }
    .nav-vault:hover { color: var(--ink); border-color: var(--line-strong); }

    /* ---------- 2-column receive layout ---------- */
    .receive {
      position: relative; z-index: 2; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 19.5px;
      padding: 69px 18px 41px;
      opacity: 0; pointer-events: none; transition: opacity .8s ease;   /* hidden behind the (transparent) intro until reveal */
    }
    .receive-intro.gone ~ .receive { opacity: 1; pointer-events: auto; }
    .receive > .eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.24em; text-transform: uppercase; color: #fff; opacity: .9; display: inline-flex; align-items: center; gap: 7.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
    .receive > .eyebrow .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-ui); box-shadow: 0 0 9px var(--accent-ui); animation: pip 1.6s ease-in-out infinite; }

    /* left - the message + contents */
    .info { display: flex; flex-direction: column; gap: 16.5px; max-width: 345px; align-self: center; }
    .info .eyebrow { font-family: var(--font-mono); font-size: 11.3px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent-ui); display: inline-flex; align-items: center; gap: 7.5px; }
    .info .eyebrow .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-ui); box-shadow: 0 0 9px var(--accent-ui); animation: pip 1.6s ease-in-out infinite; }
    @keyframes pip { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .info h1 { font-family: var(--font-serif); font-weight: 600; font-size: clamp(30px, 5.4vw, 51px); line-height: 0.92; letter-spacing: -0.02em; }
    .info h1 .italic { font-style: italic; color: var(--accent-ui); display: block; }
    .info .from-line { font-size: 12px; color: var(--muted); }
    .info .from-line b { color: var(--ink); font-weight: 600; }

    .note-card { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.012)); border: 1px solid var(--line); border-left: 2.3px solid var(--accent-ui); border-radius: 10.5px; padding: 12px 13.5px; }
    .note-card .nc-label { font-family: var(--font-mono); font-size: 9.8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 4.5px; }
    .note-card .nc-text { font-family: var(--font-serif); font-style: italic; font-size: 13.5px; line-height: 1.4; color: var(--ink); }
    .note-card[hidden] { display: none; }

    .contents { }
    .contents[hidden] { display: none; }
    .contents .c-label { font-size: 7.5px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 8.3px; padding-bottom: 5.3px; border-bottom: 1px solid var(--line); }
    .c-list { display: flex; flex-direction: column; gap: 6px; }
    .c-row { display: flex; align-items: center; gap: 9px; padding: 7.5px 9px; border: 1px solid var(--line); border-radius: 9px; background: rgba(255,255,255,0.02); }
    .contents.revealed .c-row { animation: crow-rise .5s ease both; }
    @keyframes crow-rise { from { transform: translateY(9px); } to { transform: none; } }
    .c-row .coin { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f3f4f2; box-shadow: inset 0 -2px 2.3px rgba(0,0,0,0.16), inset 0 2px 2.3px rgba(255,255,255,0.25), 0 1px 2px rgba(0,0,0,0.35); }
    .c-row .coin img { width: 100%; height: 100%; object-fit: cover; }
    .c-row .coin.no-logo { color: #fff; font-weight: 800; font-size: 10.5px; text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
    .c-row .c-meta { flex: 1; min-width: 0; }
    .c-row .c-amt { font-size: 11.3px; font-weight: 700; }
    .c-row .c-name { font-size: 9px; color: var(--muted); }
    @keyframes c-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .open-cta {
      align-self: center; margin-top: 3px;
      font-family: var(--font-main); font-size: 12.8px; font-weight: 700; letter-spacing: -0.01em;
      background: var(--accent-ui); color: #06241a; border: none; padding: 12.8px 29px; border-radius: 74px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7.5px; box-shadow: 0 10.5px 26px -7.5px var(--accent-ui);
      transition: transform .2s, box-shadow .25s, opacity .2s; opacity: 0; animation: cta-in .8s 1.6s forwards;
    }
    @keyframes cta-in { from { opacity: 0; transform: translateY(7.5px); } to { opacity: 1; transform: none; } }
    .open-cta:hover { transform: translateY(-2px); box-shadow: 0 13.5px 30px -7.5px var(--accent-ui); }
    .open-cta:disabled { opacity: 0.5; cursor: default; }
    .open-cta.claimed { background: var(--panel-2); color: var(--accent-ui); border: 1px solid rgba(0,255,157,0.4); box-shadow: none; }

    /* ---------- the stage where the box lands (centre, in a black portal on the aurora) ---------- */
    /* --rev-box is THE box size for the reveal: both render paths (legacy .box and the
       engine's .gbx-box) read it, and the mouth/landing/coin geometry is derived from it. */
    .stage { --rev-box: clamp(150px, 19vw, 250px); --rail-w: 0px; position: relative; z-index: 2; width: 100%; max-width: 660px; height: clamp(315px, 56vh, 450px); display: flex; align-items: center; justify-content: center; perspective: 1200px; padding-right: var(--rail-w); }
    @media (min-width: 900px) { .receive .stage { --rail-w: min(280px, 30vw); } }   /* room for the reveal rail */

    /* black circle in the middle; the aurora glows around it.
       left anchors at the CONTENT centre — (100% - rail) / 2 — so the portal, coins and
       landing shadow stay centred on the flex-centred box when the rail pads the stage. */
    .portal { position: absolute; left: calc((100% - var(--rail-w)) / 2); top: 50%; width: min(82vh, calc(var(--rev-box) * 1.7)); aspect-ratio: 1; transform: translate(-50%, -50%); border-radius: 50%; z-index: 0; pointer-events: none;
      background: radial-gradient(circle, #000 0%, #000 42%, rgba(0,0,0,0.82) 56%, rgba(0,0,0,0.45) 70%, rgba(0,0,0,0.14) 84%, transparent 93%);
      box-shadow: 0 0 113px 38px rgba(0,0,0,0.5); }

    /* ---------- the reveal rail: note, manifest and polaroids in a column OFF the box ---------- */
    .reveal-rail { position: absolute; top: 50%; right: 0; transform: translateY(-50%); width: min(280px, 30vw); z-index: 6;
      display: flex; flex-direction: column; gap: 13px; max-height: 96%; pointer-events: none; }
    .reveal-rail > * { pointer-events: auto; }

    /* the sender's note, top of the rail */
    .gift-note { position: relative; width: 100%;
      background: linear-gradient(180deg, #fbf3df, #ecdcba); color: #2a2018; padding: 16.5px 19.5px 18px; border-radius: 3.8px;
      box-shadow: 0 16.5px 35px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.6);
      opacity: 0; transform: rotate(2deg) translateY(10.5px); transition: opacity .7s .45s ease, transform .7s .45s cubic-bezier(.2,.8,.2,1); }
    .scene.revealed ~ .reveal-rail .gift-note { opacity: 1; transform: rotate(2deg) translateY(0); }
    .gift-note[hidden] { display: none; }
    .gift-note .gn-pin { position: absolute; top: -9.8px; left: 50%; transform: translateX(-50%); width: 16.5px; height: 16.5px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ff8a98, #d4344a 75%); box-shadow: 0 3px 6px rgba(0,0,0,0.5), inset 0 -2px 2.3px rgba(0,0,0,0.3); }
    .gift-note .gn-eyebrow { font-family: var(--font-mono); font-size: 9.8px; letter-spacing: 0.18em; text-transform: uppercase; color: #a98b5c; margin-bottom: 7.5px; }
    .gift-note .gn-text { font-family: var(--font-serif); font-style: italic; font-size: 20px; line-height: 1.35; }
    .gift-note .gn-from { margin-top: 12px; font-family: var(--font-serif); font-size: 14.3px; text-align: right; color: #6b5a40; }
    .gift-note .gn-from b { color: #2a2018; font-weight: 600; font-style: italic; }

    /* actions below the box */
    .reveal-foot { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 405px; }
    .from-line { font-size: 11.3px; color: rgba(255,255,255,0.72); text-shadow: 0 2px 9px rgba(0,0,0,0.6); }
    .from-line b { color: #fff; font-weight: 600; }

    /* before it's opened the box invites a click; after opening you can spin it.
       --gbx-size pins the ENGINE render path (template gifts) to the same --rev-box —
       unset it falls to the engine's huge ~32vw default. */
    #scene .gbx-box { cursor: pointer; --gbx-size: var(--rev-box); }
    .stage.can-drag .gbx-box { cursor: grab; }
    .stage.dragging .gbx-box { cursor: grabbing; }

    /* asset icons rise OUT OF THE BOX MOUTH on open: the container is a clip window whose
       bottom edge sits at the mouth line, so the coins start hidden inside the box and
       emerge upward through the middle (never pasted over the back flap). */
    .above-icons { position: absolute; left: calc((100% - var(--rail-w)) / 2); bottom: calc(50% + var(--rev-box) * 0.30); transform: translateX(-50%);
      box-sizing: border-box; height: calc(var(--rev-box) * 0.78 + 26px); padding: 26px 14px 0; overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center; gap: clamp(7px, calc(var(--rev-box) * 0.05), 14px); z-index: 5; pointer-events: none; }
    /* the 26px top padding is headroom INSIDE the clip: ai-bob lifts the pieces 6px and the
       glow shadow needs room, so without it they shear at the window's top edge. The
       bottom edge stays at the mouth line (bottom-anchored, padding only extends upward). */
    /* each gifted asset rises as the THING it is (asset-visuals.js: digital card / art
       frame / booster pack) inside an .above-rise shell that owns the motion */
    .above-rise { display: flex; align-items: flex-end; opacity: 0; will-change: transform, opacity;
      transform: translateY(calc(var(--rev-box) * 0.82)) scale(.5); }
    .above-rise .av { --av-h: clamp(44px, calc(var(--rev-box) * 0.34), 86px); }
    .above-icons.show .above-rise { animation: ai-rise2 .95s cubic-bezier(.16,.88,.22,1.06) var(--ai-delay,0s) both, ai-bob2 4.6s ease-in-out calc(1.2s + var(--ai-delay,0s)) infinite; }
    @keyframes ai-rise2 { 55% { opacity: 1; } to { opacity: 1; transform: translateY(0) scale(1) rotate(var(--ai-rot, -2deg)); } }
    @keyframes ai-bob2 { 0%,100% { transform: translateY(0) rotate(var(--ai-rot, -2deg)); } 50% { transform: translateY(-6px) rotate(var(--ai-rot, -2deg)); } }
    /* legacy disc fallback (kept for safety if asset-visuals.js is absent) */
    .above-coin { width: clamp(26px, calc(var(--rev-box) * 0.165), 40px); height: clamp(26px, calc(var(--rev-box) * 0.165), 40px); border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f3f4f2; color: #111; font-weight: 800; font-size: clamp(10px, calc(var(--rev-box) * 0.06), 15px);
      box-shadow: inset 0 -2px 3px rgba(0,0,0,0.18), inset 0 2px 3px rgba(255,255,255,0.3), 0 9px 19.5px rgba(0,0,0,0.5), 0 0 19.5px -3px var(--accent-ui);
      opacity: 0; transform: translateY(calc(var(--rev-box) * 0.58)) scale(.45); }
    .above-coin img { width: 100%; height: 100%; object-fit: cover; }
    .above-coin.no-logo { background: #888; color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
    .above-icons.show .above-coin { animation: ai-rise .85s cubic-bezier(.2,.85,.25,1) var(--ai-delay,0s) both, ai-bob 4.2s ease-in-out calc(1.05s + var(--ai-delay,0s)) infinite; }
    @keyframes ai-rise { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes ai-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @media (prefers-reduced-motion: reduce) {
      .above-coin, .above-rise { opacity: 1; transform: none; }
      .above-rise { transform: rotate(var(--ai-rot, -2deg)); }
      .above-icons.show .above-coin, .above-icons.show .above-rise { animation: none; }
    }

    /* pretty manifest of gifted assets, in the rail under the note */
    .manifest { position: relative; width: 100%; display: flex; flex-direction: column; gap: 6.8px;
      opacity: 0; transform: translateY(12px); transition: opacity .6s ease, transform .6s cubic-bezier(.2,.8,.2,1); }
    .manifest.revealed { opacity: 1; transform: none; }
    .manifest[hidden] { display: none; }
    .manifest .m-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.62); text-shadow: 0 2px 7.5px rgba(0,0,0,0.6); margin-bottom: 1px; }
    .manifest .c-list { gap: 6.8px; }
    .manifest .c-row { background: rgba(13,17,21,0.66); border: 1px solid rgba(255,255,255,0.12); -webkit-backdrop-filter: blur(6.8px); backdrop-filter: blur(6.8px); box-shadow: 0 9px 21px rgba(0,0,0,0.45); }
    .manifest .c-amt { color: #fff; }
    .manifest .c-usd { font-family: var(--font-mono); font-size: 9.8px; color: var(--accent-ui); white-space: nowrap; align-self: center; }

    /* polaroid photos the sender attached: they POP UP NEXT TO THE BOX, pinned at angles
       like photos dropped beside it. Anchored at the box centre (same column as the
       scene), each photo carries its own slot offsets in --rev-box units via CSS vars. */
    .photo-scatter { position: absolute; left: calc((100% - var(--rail-w)) / 2); top: 50%; width: 0; height: 0; z-index: 6; pointer-events: none; }
    .photo-scatter[hidden] { display: none; }
    .photo-pol { position: absolute; left: 0; top: 0; margin: 0; width: calc(var(--rev-box) * 0.56); max-width: 150px;
      background: #fdfdf8; padding: 6px 6px 20px; border-radius: 2px; pointer-events: auto;
      box-shadow: 0 14px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.7);
      opacity: 0; transform: translate(calc(var(--pp-x) - 50%), calc(var(--pp-y) - 50% + 22px)) scale(.55); will-change: transform, opacity; }
    .photo-pol img { display: block; width: 100%; aspect-ratio: 1; object-fit: cover; background: #e8e4d8; }
    .photo-pol .pp-pin { position: absolute; top: -7px; left: 50%; transform: translateX(-50%); width: 13px; height: 13px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ff8a98, #d4344a 75%); box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 -2px 2px rgba(0,0,0,0.3); }
    .photo-scatter.revealed .photo-pol { animation: pol-pop .7s cubic-bezier(.18,.88,.26,1.14) var(--pp-delay, 0s) both; }
    @keyframes pol-pop {
      from { opacity: 0; transform: translate(calc(var(--pp-x) - 50%), calc(var(--pp-y) - 50% + 22px)) scale(.55) rotate(0deg); }
      to   { opacity: 1; transform: translate(calc(var(--pp-x) - 50%), calc(var(--pp-y) - 50%)) scale(1) rotate(var(--pp-rot, -4deg)); }
    }
    @media (prefers-reduced-motion: reduce) {
      .photo-scatter.revealed .photo-pol { animation: none; opacity: 1;
        transform: translate(calc(var(--pp-x) - 50%), calc(var(--pp-y) - 50%)) rotate(var(--pp-rot, -4deg)); }
    }

    /* soft shadow the box settles onto */
    .landing { position: absolute; left: calc((100% - var(--rail-w)) / 2); bottom: 16%; width: calc(var(--rev-box) * 0.92); height: 30px; transform: translateX(-50%); border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 70%); filter: blur(6px); opacity: 0;
      animation: shadow-in 0.6s 0.95s forwards; }
    @keyframes shadow-in { to { opacity: 1; } }

    /* the box stays hidden until the delivery intro reveals it (centre stage) */
    .scene { transform-style: preserve-3d; position: relative; z-index: 1; opacity: 0; }
    .scene.revealed { opacity: 1; animation: box-reveal 1.2s cubic-bezier(.22,1.05,.36,1) both, float 6s 1.3s ease-in-out infinite; }
    @keyframes box-reveal { 0% { opacity: 0; transform: translateY(36px) scale(.42); } 55% { opacity: 1; } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    /* arrive from the top, overshoot, settle (legacy load entrance) */
    @keyframes drop-in {
      0%   { transform: translateY(-118vh) scale(0.9); opacity: 0; }
      45%  { opacity: 1; }
      70%  { transform: translateY(12px) scale(1.0); }
      85%  { transform: translateY(-5.3px); }
      100% { transform: translateY(0) scale(1); }
    }
    /* gentle idle hover after landing */
    @keyframes float {
      0%,100% { transform: translateY(0) rotateX(0deg) rotateY(0deg); }
      50%     { transform: translateY(-12px) rotateX(-2.5deg) rotateY(4deg); }
    }
    .stage.dragging .scene { animation-play-state: paused; }

    .box { --box-size: var(--rev-box, clamp(210px, 32vw, 315px)); position: relative; width: var(--box-size); height: var(--box-size); transform-style: preserve-3d; transform: rotateY(-24deg) rotateX(13deg); transition: transform 1s cubic-bezier(.5,.02,.2,1); }
    .stage.can-drag { cursor: grab; } .stage.dragging { cursor: grabbing; } .stage.dragging .box { transition: none; }
    .box.opened { transform: rotateY(-14deg) rotateX(8deg); }

    .face { position: absolute; width: var(--box-size); height: var(--box-size); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); border-radius: 6.8px; background: var(--bg-dark, #5a4226); background-size: var(--bg-size, auto); }
    .face:not(.front)::after { content: ''; position: absolute; inset: 0; pointer-events: none; background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 4.5px); opacity: 0.55; }
    .face.back   { transform: translateZ(calc(var(--box-size) / -2)) rotateY(180deg); }
    .face.left   { transform: rotateY(-90deg) translateZ(calc(var(--box-size) / 2)); }
    .face.right  { background: var(--bg-side2, #5a4226); background-size: var(--bg-size, auto); transform: rotateY(90deg) translateZ(calc(var(--box-size) / 2)); }
    .face.bottom { transform: rotateX(-90deg) translateZ(calc(var(--box-size) / 2)); }

    .cavity { position: absolute; inset: 7%; background: radial-gradient(circle at 50% 38%, #20242a, #06080a 80%); box-shadow: inset 0 7.5px 23px rgba(0,0,0,0.9); transform: rotateX(90deg) translateZ(calc(var(--box-size) / -2 + 12px)); border-radius: 5.3px; }

    /* FRONT - hinged at the bottom, drops open on reveal */
    .face.front {
      background: var(--bg-front, #6b4f33); background-size: var(--bg-size, auto); color: var(--accent, #e8d5b0);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: calc(var(--box-size) * 0.09);
      transform-origin: bottom; transform: translateZ(calc(var(--box-size) / 2)) rotateX(0deg);
      transition: transform 1s cubic-bezier(.5,.02,.2,1); z-index: 2;
    }
    /* front stays shut on open - only the top lid opens */
    .box.opened .face.front { transform: translateZ(calc(var(--box-size) / 2)) rotateX(0deg); }
    .front-fx { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .front-fx.stripes    { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.10) 0 5.3px, transparent 5.3px 12px); animation: pat-pan 7s ease-in-out infinite alternate; }
    .front-fx.dots       { background-image: radial-gradient(rgba(255,255,255,0.16) 1.5px, transparent 1.8px); background-size: 12px 12px; animation: pat-pan 9s ease-in-out infinite alternate; }
    .front-fx.grid       { background-image: linear-gradient(rgba(255,255,255,0.11) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.11) 1px, transparent 1px); background-size: 13.5px 13.5px; animation: pat-pan 11s ease-in-out infinite alternate; }
    .front-fx.chevron    { background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.10) 0 4.5px, transparent 4.5px 10.5px), repeating-linear-gradient(45deg, rgba(255,255,255,0.10) 0 4.5px, transparent 4.5px 10.5px); background-size: 21px 21px; animation: pat-pan 10s ease-in-out infinite alternate; }
    .front-fx.crosshatch { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 6.8px), repeating-linear-gradient(-45deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 6.8px); animation: pat-pan 12s ease-in-out infinite alternate; }
    .front-fx.waves      { background-image: radial-gradient(circle at 50% 120%, transparent 5.3px, rgba(255,255,255,0.12) 6px, transparent 6.8px); background-size: 16.5px 9.8px; animation: pat-pan 8s ease-in-out infinite alternate; }
    .front-fx.checker    { background-image: conic-gradient(rgba(255,255,255,0.09) 0 25%, transparent 0 50%, rgba(255,255,255,0.09) 0 75%, transparent 0); background-size: 16.5px 16.5px; animation: pat-pan 13s ease-in-out infinite alternate; }
    .front-fx.rings      { background-image: radial-gradient(circle, transparent 3px, rgba(255,255,255,0.13) 3.8px, transparent 4.5px); background-size: 18px 18px; animation: pat-pan 9.5s ease-in-out infinite alternate; }
    .front-fx.plus       { background-image: linear-gradient(rgba(255,255,255,0.14) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.14) 2px, transparent 2px); background-size: 16.5px 16.5px; animation: pat-pan 11.5s ease-in-out infinite alternate; }
    .front-fx.diagonal   { background-image: repeating-linear-gradient(60deg, rgba(255,255,255,0.09) 0 6.8px, transparent 6.8px 15px); animation: pat-pan 10.5s ease-in-out infinite alternate; }
    .front-fx.weave      { background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 7.5px), repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 7.5px); background-size: 15px 15px; animation: pat-pan 12.5s ease-in-out infinite alternate; }
    @keyframes pat-pan { from { background-position: 0 0; } to { background-position: 18px 12px; } }
    .brandwrap { border: 2.3px solid currentColor; padding: calc(var(--box-size) * 0.05) calc(var(--box-size) * 0.07); text-align: center; max-width: 86%; position: relative; z-index: 2; }
    .brandwrap h2 { font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: calc(var(--box-size) * 0.15); line-height: 0.95; overflow-wrap: break-word; }
    .sublabel { font-family: var(--font-mono); font-size: calc(var(--box-size) * 0.056); letter-spacing: 0.18em; margin-top: calc(var(--box-size) * 0.02); text-transform: uppercase; }
    .specs { margin-top: calc(var(--box-size) * 0.06); width: 86%; font-family: var(--font-mono); font-size: calc(var(--box-size) * 0.05); text-transform: uppercase; border-top: 2px solid currentColor; padding-top: calc(var(--box-size) * 0.022); display: flex; justify-content: space-between; position: relative; z-index: 2; }

    /* RIGHT - shipping label + asset stamps */
    .label { position: absolute; bottom: calc(var(--box-size) * 0.12); left: calc(var(--box-size) * 0.12); width: calc(var(--box-size) * 0.46); background: #e8e6e0; color: #111; padding: calc(var(--box-size) * 0.05); transform: rotate(-5deg); box-shadow: 0 3px 10.5px rgba(0,0,0,0.5); font-family: var(--font-main); z-index: 2; }
    .label-title { font-weight: 800; font-size: calc(var(--box-size) * 0.05); letter-spacing: 0.06em; }
    .label-to { font-size: calc(var(--box-size) * 0.045); margin-top: 2.3px; color: #333; }
    .label .addr { height: 2.3px; background: #bdb9af; margin: calc(var(--box-size) * 0.025) 0; width: 85%; }
    .label .addr.short { width: 55%; }
    .barcode { height: calc(var(--box-size) * 0.12); margin-top: calc(var(--box-size) * 0.03); background: repeating-linear-gradient(90deg, #111 0 2px, #e8e6e0 2px 3px); }
    .side-stamps { position: absolute; right: calc(var(--box-size) * 0.08); top: calc(var(--box-size) * 0.15); width: calc(var(--box-size) * 0.3); height: calc(var(--box-size) * 0.68); display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: calc(var(--box-size) * 0.035); z-index: 2; pointer-events: none; }
    .side-stamp { width: calc(var(--box-size) * 0.145); height: calc(var(--box-size) * 0.145); border-radius: 50%; border: 2px solid var(--accent, #e8d5b0); color: var(--accent, #e8d5b0); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: calc(var(--box-size) * 0.06); line-height: 1; opacity: 0.9; transform: rotate(-7deg); }

    /* LEFT - care icons */
    .face.left, .face.back, .face.bottom { color: var(--accent, #e8d5b0); }
    .side-eyebrow { font-family: var(--font-mono); font-size: calc(var(--box-size)*0.045); letter-spacing: 0.22em; opacity: 0.75; }
    .side-rule { width: 64%; height: 2px; background: currentColor; opacity: 0.5; margin: calc(var(--box-size)*0.035) auto; }
    .side-barcode { height: calc(var(--box-size)*0.1); background: repeating-linear-gradient(90deg, currentColor 0 2px, transparent 2px 3.8px); opacity: 0.5; }
    .side-stack { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: calc(var(--box-size)*0.03); padding: calc(var(--box-size)*0.1); text-align: center; }
    .handling { display: flex; gap: calc(var(--box-size)*0.045); }
    .hsym { width: calc(var(--box-size)*0.155); height: calc(var(--box-size)*0.155); border: 2px solid currentColor; border-radius: calc(var(--box-size)*0.03); display: flex; align-items: center; justify-content: center; opacity: 0.9; }
    .hsym svg { width: 62%; height: 62%; }
    .side-caption { font-family: var(--font-main); font-weight: 800; font-size: calc(var(--box-size)*0.05); letter-spacing: 0.12em; opacity: 0.9; }
    .side-stack .side-barcode { width: 62%; }

    /* BACK - return + postage */
    .back-grid { position: absolute; inset: 0; z-index: 1; }
    .ret-block { position: absolute; top: calc(var(--box-size)*0.13); left: calc(var(--box-size)*0.11); width: 52%; }
    .ret-name { font-family: var(--font-main); font-weight: 800; font-size: calc(var(--box-size)*0.052); margin-top: 3px; line-height: 1.1; }
    .ret-line { height: 2px; background: currentColor; opacity: 0.4; margin-top: calc(var(--box-size)*0.035); width: 92%; }
    .ret-line.short { width: 58%; }
    .postage { position: absolute; top: calc(var(--box-size)*0.11); right: calc(var(--box-size)*0.1); width: calc(var(--box-size)*0.19); height: calc(var(--box-size)*0.23); border: 2px dashed currentColor; border-radius: 3.8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: calc(var(--box-size)*0.012); transform: rotate(4deg); }
    .postage-star { font-size: calc(var(--box-size)*0.085); line-height: 1; }
    .postage-val { font-family: var(--font-mono); font-size: calc(var(--box-size)*0.042); letter-spacing: 0.06em; }
    .postmark { position: absolute; top: calc(var(--box-size)*0.42); right: calc(var(--box-size)*0.12); width: calc(var(--box-size)*0.27); height: calc(var(--box-size)*0.27); border: 2px solid currentColor; border-radius: 50%; opacity: 0.55; display: flex; align-items: center; justify-content: center; text-align: center; transform: rotate(-12deg); }
    .postmark::before { content: ''; position: absolute; inset: calc(var(--box-size)*0.02); border: 1px solid currentColor; border-radius: 50%; opacity: 0.7; }
    .postmark span { font-family: var(--font-mono); font-size: calc(var(--box-size)*0.032); letter-spacing: 0.08em; line-height: 1.25; max-width: 78%; }
    .back-grid .side-barcode { position: absolute; bottom: calc(var(--box-size)*0.12); left: calc(var(--box-size)*0.11); width: 78%; }

    /* BOTTOM - seal */
    .bottom-stack { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: calc(var(--box-size)*0.04); text-align: center; padding: calc(var(--box-size)*0.1); }
    .seal { width: calc(var(--box-size)*0.3); height: calc(var(--box-size)*0.3); border: 2px solid currentColor; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; opacity: 0.92; }
    .seal::before { content: ''; position: absolute; inset: calc(var(--box-size)*0.028); border: 1px dashed currentColor; border-radius: 50%; opacity: 0.7; }
    .seal-star { font-size: calc(var(--box-size)*0.13); line-height: 1; }
    .made { font-family: var(--font-mono); font-size: calc(var(--box-size)*0.042); letter-spacing: 0.12em; opacity: 0.85; }
    .serial { font-family: var(--font-mono); font-size: calc(var(--box-size)*0.04); letter-spacing: 0.08em; opacity: 0.55; }

    /* TOP - lid flaps + tape; flaps open on reveal */
    .lid-plane { position: absolute; width: var(--box-size); height: var(--box-size); transform: rotateX(90deg) translateZ(calc(var(--box-size) / 2)); transform-style: preserve-3d; pointer-events: none; }
    .flap { position: absolute; background: var(--bg-top, #7c5c39); background-size: var(--bg-size, auto); border: 1px solid rgba(0,0,0,0.18); border-radius: 5.3px; transition: transform 1s cubic-bezier(.5,.02,.2,1); box-shadow: 0 0 6px rgba(0,0,0,0.25); }
    .fl-back  { top: 0; left: 0; width: 100%; height: 50%; transform-origin: center top;    transform: translateZ(0.6px) rotateX(0deg); }
    .fl-front { bottom: 0; left: 0; width: 100%; height: 50%; transform-origin: center bottom; transform: translateZ(0.6px) rotateX(0deg); }
    .fl-left  { top: 0; left: 0; width: 50%; height: 100%; transform-origin: left center;   transform: translateZ(-0.6px) rotateY(0deg); }
    .fl-right { top: 0; right: 0; width: 50%; height: 100%; transform-origin: right center; transform: translateZ(-0.6px) rotateY(0deg); }
    .box.opened .fl-back  { transform: translateZ(0.6px) rotateX(-124deg); }
    .box.opened .fl-front { transform: translateZ(0.6px) rotateX(124deg); }
    .box.opened .fl-left  { transform: translateZ(-0.6px) rotateY(-124deg); }
    .box.opened .fl-right { transform: translateZ(-0.6px) rotateY(124deg); }
    .tape-wall { position: absolute; left: 0; width: 100%; top: 39%; height: 22%; transform: translateZ(2px); pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.12) 0 3.8px, transparent 3.8px 8.3px),
        linear-gradient(180deg, color-mix(in srgb, var(--tape, #d6b88c) 82%, transparent), color-mix(in srgb, var(--tape, #d6b88c) 64%, transparent));
      border-top: 1px solid rgba(255,255,255,0.3); border-bottom: 1px solid rgba(0,0,0,0.24); transition: opacity .4s; }
    .box.opened .tape-wall { opacity: 0; }

    /* interior light + particles + coins flying out (reveal) */
    .glow, .beam { position: absolute; top: 50%; left: 50%; opacity: 0; pointer-events: none; }
    .glow { width: calc(var(--box-size)*0.85); height: calc(var(--box-size)*0.85); transform: translate(-50%,-50%) translateZ(-9px); background: radial-gradient(circle, color-mix(in srgb, var(--accent,#00FF9D) 75%, transparent) 0%, transparent 70%); filter: blur(12px); }
    .box.opened .glow { opacity: 0.7; transition: opacity .7s .35s; }
    .beam { width: calc(var(--box-size)*0.55); height: calc(var(--box-size)*2.4); transform-origin: bottom center; transform: translate(-50%,-100%) translateZ(0); background: linear-gradient(to top, color-mix(in srgb, var(--accent,#00FF9D) 80%, transparent) 0%, transparent 78%); filter: blur(18px); }
    .box.opened .beam { animation: beam 1.3s .45s forwards; }
    @keyframes beam { from { opacity: 0; height: 0; } to { opacity: 0.8; height: calc(var(--box-size)*2.4); } }
    .particles { position: absolute; top: 50%; left: 50%; width: var(--box-size); height: var(--box-size); transform: translate(-50%,-50%); transform-style: preserve-3d; pointer-events: none; }
    .particle { position: absolute; bottom: 34%; width: 3.8px; height: 3.8px; border-radius: 50%; background: #fff; box-shadow: 0 0 6px 2px var(--accent,#00FF9D); opacity: 0; }
    .box.opened .particle { animation: particle 3.2s linear infinite; }
    .particle:nth-child(1){ left:30%; animation-delay:.6s; } .particle:nth-child(2){ left:68%; width:5.3px; height:5.3px; animation-delay:1s; }
    .particle:nth-child(3){ left:46%; animation-delay:1.4s; } .particle:nth-child(4){ left:58%; width:2.3px; height:2.3px; animation-delay:.8s; }
    .particle:nth-child(5){ left:22%; animation-delay:1.7s; } .particle:nth-child(6){ left:78%; animation-delay:1.2s; }
    @keyframes particle { 0%{ transform: translateY(0) scale(0); opacity:0; } 20%{ opacity:.9; } 100%{ transform: translateY(-180px) translateX(13.5px) scale(.4); opacity:0; } }

    .pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); transform-style: preserve-3d; pointer-events: none; z-index: 3; }
    .pop-coin { position: absolute; left: 0; top: 0; width: calc(var(--box-size)*0.2); height: calc(var(--box-size)*0.2); border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; color:#fff; font-weight:800; font-size: calc(var(--box-size)*0.085); box-shadow: inset 0 -2.3px 3.8px rgba(0,0,0,0.3), inset 0 2.3px 3.8px rgba(255,255,255,0.25), 0 6px 13.5px rgba(0,0,0,0.5); text-shadow: 0 1px 1px rgba(0,0,0,0.3); opacity: 0; transform: translate(-50%,-50%); }
    .pop-coin img { width:100%; height:100%; object-fit:cover; }
    .box.opened .pop-coin { animation: pop 1.1s cubic-bezier(.2,.8,.25,1) forwards; }
    @keyframes pop { 0%{ opacity:0; transform: translate(-50%,-50%) translateY(30px) scale(0.3); } 35%{ opacity:1; } 100%{ opacity:1; transform: translate(-50%,-50%) translateY(var(--pop-y,-113px)) translateX(var(--pop-x,0px)) scale(1) rotate(var(--pop-r,0deg)); } }

    /* compact pop used when the scatter flows in-column (no slot offsets) */
    @keyframes pol-pop-m {
      from { opacity: 0; transform: translateY(16px) scale(.6) rotate(0deg); }
      to   { opacity: 1; transform: translateY(0) scale(1) rotate(var(--pp-rot, -4deg)); }
    }

    /* below 900px the rail leaves the side and flows UNDER the stage */
    @media (max-width: 899px) {
      .reveal-rail { position: static; transform: none; width: min(340px, 92vw); margin: 6px auto 0; }
    }
    @media (max-width: 735px) {
      .receive { padding: 63px 12px 30px; gap: 13.5px; }
      .stage { --rev-box: clamp(140px, 46vw, 205px); height: auto; min-height: 38vh; flex-direction: column; }
      .portal { width: min(94vw, calc(var(--rev-box) * 1.7)); top: calc(var(--rev-box) * 0.62); }
      /* column stage: the box sits at the top, so anchor the mouth clip + landing to it
         (clip top = mouth line - content height - headroom = boxTop + 0.12rev - 0.78rev - 26px) */
      .above-icons { bottom: auto; top: calc(var(--rev-box) * -0.66 - 26px); transform: translateX(-50%); }
      .landing { bottom: auto; top: calc(var(--rev-box) * 0.96); }
      .gift-note { transform: rotate(-1.5deg); }
      .scene.revealed ~ .reveal-rail .gift-note { transform: rotate(-1.5deg); }
      /* photos: no room beside the box — they pop in a row under it instead */
      .photo-scatter { position: static; width: auto; height: auto; display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
      .photo-pol { position: static; width: min(27vw, 118px); transform: none; }
      .photo-scatter.revealed .photo-pol { animation: pol-pop-m .6s cubic-bezier(.18,.88,.26,1.14) var(--pp-delay, 0s) both; }
      @media (prefers-reduced-motion: reduce) {
        .photo-scatter.revealed .photo-pol { animation: none; opacity: 1; transform: rotate(var(--pp-rot, -4deg)); }
      }
    }

    /* ============================================================
       DELIVERY INTRO - opposite of the send flow: the van arrives,
       drops a clickable package, drives off; clicking it reveals the
       gift box centre-stage. Reuses the send page's van/city/aurora.
       ============================================================ */
    /* street scene scale — the town art scales with viewport width (the quay panorama
       is 100%-width), so the van / dropped package / tap hint grow with it or they
       read toy-sized on wide screens. Same steps as the send page; applied via the
       independent `scale` property so the transform keyframe animations compose. */
    :root { --street-scale: 1; }
    @media (min-width: 1600px) { :root { --street-scale: 1.18; } }
    @media (min-width: 1920px) { :root { --street-scale: 1.32; } }
    @media (min-width: 2400px) { :root { --street-scale: 1.5; } }
    .receive-intro { position: fixed; inset: 0; z-index: 40; overflow: hidden; background: transparent; transition: opacity .7s ease; }
    .receive-intro.gone { opacity: 0; pointer-events: none; }
    /* the aurora is a PERSISTENT full-page background (lives outside the intro) so it
       stays once the delivery fades and the box comes up on it. */
    .ri-aurora { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; background: #05060b; }
    .ri-status { position: fixed; top: 69px; left: 0; right: 0; z-index: 6; text-align: center; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.72); pointer-events: none; transition: opacity .4s; }
    .ri-status .pip { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6.8px; background: var(--bor-bright, #00FF9D); box-shadow: 0 0 9px var(--bor-bright, #00FF9D); vertical-align: middle; animation: pip 1.6s ease-in-out infinite; }

    /* city skyline (copied from the send page) */
    .ri-city { position: absolute; left: 0; bottom: 0; width: 100%; height: clamp(165px, 30vh, 240px); z-index: 0; pointer-events: none; overflow: hidden; }
    .ri-city svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    /* clean dark silhouettes: no outlines, no glow */
    .fpc-bg { fill: #060209; } .fpc-mid { fill: #040106; } .fpc-fg { fill: #030105; }
    .fpc-rim-m, .fpc-rim-c, .fpc-rim-s { stroke: none; }
    .fpc-win { fill: #ffd166; opacity: .8; filter: drop-shadow(0 0 3px rgba(255,209,102,0.8)); animation: fpc-window 4s infinite alternate ease-in-out; }
    @keyframes fpc-window { 0% { opacity: .4; filter: drop-shadow(0 0 2px rgba(255,209,102,0.4)); } 100% { opacity: .9; filter: drop-shadow(0 0 4.5px rgba(255,209,102,0.9)); } }

    /* road */
    .ri-road { position: absolute; bottom: 0; left: 0; width: 100%; height: 38px; z-index: 1; background: linear-gradient(180deg, #0F111A, #050508); border-top: 1px solid #23273B; }
    .ri-road::before { content: ''; position: absolute; top: 18px; left: 0; width: 100%; height: 3px; background: repeating-linear-gradient(90deg, #3A415C 0 53px, transparent 53px 98px); opacity: .5; }
    .ri-road-glow { position: absolute; bottom: 37px; left: 0; width: 100%; height: 2px; z-index: 1; background: color-mix(in srgb, var(--pkg-accent, #00FF9D) 30%, transparent); filter: blur(1.5px); }

    /* the dropped, clickable package */
    .ri-package { position: absolute; bottom: 44px; left: 50%; z-index: 4; width: 72px; height: 60px; transform: translateX(-50%); opacity: 0; animation: ri-drop 7s 2.4s both; scale: var(--street-scale); transform-origin: 50% 100%; }
    @keyframes ri-drop {
      0%, 52% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(.5) rotate(-7deg); }
      66% { opacity: 1; transform: translateX(-50%) translateY(8px) scale(1.08) rotate(1.5deg); }
      82% { transform: translateX(-50%) translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    .ri-package::after { content: ''; position: absolute; left: -10px; right: -10px; bottom: -8px; height: 11px; background: rgba(0,0,0,0.6); filter: blur(7px); border-radius: 100%; z-index: -1; }
    .ri-package .pk-body { position: absolute; left: 0; right: 0; bottom: 0; top: 16px; border-radius: 6px; background: linear-gradient(135deg, var(--pkg1, #7c3aed), var(--pkg2, #ec4899)); box-shadow: 0 10px 22px rgba(0,0,0,0.6), 0 0 22px -3px var(--pkg-accent, #fde68a), inset 0 0 0 1px rgba(255,255,255,0.2); }
    .ri-package .pk-lid { position: absolute; left: -4px; right: -4px; top: 9px; height: 15px; border-radius: 5px; background: linear-gradient(135deg, var(--pkg2, #ec4899), var(--pkg1, #7c3aed)); box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.22); }
    .ri-package .pk-band-v { position: absolute; left: 50%; top: 16px; bottom: 0; width: 8px; transform: translateX(-50%); background: var(--pkg-accent, #fde68a); opacity: .95; z-index: 2; }
    .ri-package .pk-bow { position: absolute; left: 50%; top: 2px; width: 22px; height: 16px; transform: translateX(-50%); z-index: 3; }
    .ri-package .pk-bow::before, .ri-package .pk-bow::after { content: ''; position: absolute; top: 0; width: 11px; height: 16px; border: 3px solid var(--pkg-accent, #fde68a); border-radius: 60% 60% 50% 50%; }
    .ri-package .pk-bow::before { left: -1px; transform: rotate(-22deg); } .ri-package .pk-bow::after { right: -1px; transform: rotate(22deg); }
    .receive-intro.armed { cursor: pointer; }
    .receive-intro.armed .ri-package { cursor: pointer; }
    .receive-intro.armed .ri-package .pk-body { animation: pk-pulse 1.9s ease-in-out infinite; }
    @keyframes pk-pulse {
      0%,100% { box-shadow: 0 7.5px 16.5px rgba(0,0,0,0.6), 0 0 16.5px -2.3px var(--pkg-accent, #fde68a), inset 0 0 0 1px rgba(255,255,255,0.2); transform: translateY(0); }
      50% { box-shadow: 0 9.8px 21px rgba(0,0,0,0.6), 0 0 30px 2px var(--pkg-accent, #fde68a), inset 0 0 0 1px rgba(255,255,255,0.32); transform: translateY(-2.3px); }
    }
    .ri-hint { position: absolute; left: 50%; bottom: calc(44px + 78px * var(--street-scale)); z-index: 5; transform: translateX(-50%) translateY(6px); opacity: 0; transition: opacity .4s, transform .4s; pointer-events: none; font-family: var(--font-main); font-weight: 700; font-size: 14px; color: #fff; background: rgba(0,0,0,0.42); border: 1px solid rgba(255,255,255,0.16); padding: 9px 17px; border-radius: 99px; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; scale: var(--street-scale); transform-origin: 50% 100%; }
    .ri-hint .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--bor-bright, #00FF9D); box-shadow: 0 0 8px var(--bor-bright, #00FF9D); }
    .receive-intro.armed .ri-hint { opacity: 1; animation: hint-bob 2.4s ease-in-out infinite; }
    @keyframes hint-bob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-4.5px); } }

    /* ephemeral opening line - same dreamy per-character reveal as the send page;
       chars blur-in (staggered), gently float, then the whole line fades as the van arrives. */
    .ri-prelude { position: absolute; inset: 0; z-index: 7; display: grid; place-items: center; padding: 18px; text-align: center; pointer-events: none; transition: opacity .7s ease; }
    .ri-prelude.gone { opacity: 0; }
    .ri-prelude .pl-text { font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: clamp(39px, 11vw, 105px); line-height: 1.0; color: #fff; letter-spacing: -0.015em; max-width: 15ch; text-shadow: 0 2.3px 23px rgba(0,0,0,0.55); transform: translateY(-9vh); }
    /* NOTE: no base blur here — the blur-in lives in the @keyframes 0%. A base blur would
       re-apply once a glyph switches to the float animation (which doesn't set filter). */
    .ri-prelude .dream-char { display: inline-block; opacity: 0; transform: translateY(18px); animation: ri-ds-reveal 2.4s cubic-bezier(.2,.8,.2,1) forwards; --gc: rgba(255,255,255,0.25); text-shadow: 0 1px 2.3px rgba(0,0,0,0.35); will-change: transform, opacity;
      /* each glyph dissolves at its OWN bottom, blending into the aurora */
      -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 62%, transparent 100%); mask-image: linear-gradient(180deg, #000 0%, #000 62%, transparent 100%); }
    .ri-prelude .dream-char.float { animation: ri-ds-breath 7s infinite ease-in-out alternate; }
    @keyframes ri-ds-reveal {
      0%   { opacity: 0; filter: blur(2px); transform: translateY(28px); }
      35%  { opacity: .85; filter: blur(0); }
      100% { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
    @keyframes ri-ds-breath {
      0%   { opacity: 1; transform: translateY(0);    text-shadow: 0 1px 3px rgba(0,0,0,0.35); }
      50%  { opacity: 1; transform: translateY(-3px); text-shadow: 0 1px 4px rgba(0,0,0,0.40); }
      100% { opacity: 1; transform: translateY(2px);  text-shadow: 0 1px 3px rgba(0,0,0,0.30); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ri-prelude .dream-char { animation: none !important; opacity: 1 !important; filter: none !important; transform: none !important; }
    }

    /* delivery van (copied from the send page; faster timing for arrival) */
    .dv-van { position: absolute; bottom: var(--van-bottom, 50px); left: 0; z-index: 5; animation: dv-drive 7s 2.4s both; will-change: transform; }
    /* quay-style towns (e.g. the riverside town) bring their own ground → hide our road strip */
    html[data-bset-quay] .ri-road, html[data-bset-quay] .ri-road-glow { display: none; }
    @keyframes dv-drive {
      0%   { transform: translateX(-720px); animation-timing-function: cubic-bezier(.3,.55,.45,1); }
      30%  { transform: translateX(calc(50vw - 165px)); animation-timing-function: linear; }
      70%  { transform: translateX(calc(50vw - 165px)); animation-timing-function: cubic-bezier(.45,.1,.6,1); }
      100% { transform: translateX(calc(100vw + 240px)); }
    }
    .dv-rig { position: relative; display: flex; align-items: flex-end; animation: dv-susp 7s 2.4s both; transform-origin: center bottom; scale: var(--street-scale); }
    @keyframes dv-susp {
      0%,20% { transform: translateY(0) rotate(0deg); } 26% { transform: translateY(3px) rotate(1deg); }
      30% { transform: translateY(8px) rotate(2.4deg); } 32% { transform: translateY(-5px) rotate(-1.4deg); }
      34% { transform: translateY(3px) rotate(.7deg); } 36%,68% { transform: translateY(0) rotate(0deg); }
      70% { transform: translateY(-4px) rotate(-2deg); } 72% { transform: translateY(1px) rotate(.6deg); }
      74%,100% { transform: translateY(0) rotate(0deg); }
    }
    .dv-shadow { position: absolute; bottom: -12px; left: 50%; width: 290px; height: 12px; transform: translateX(-50%); background: rgba(0,0,0,0.85); filter: blur(9px); border-radius: 100%; animation: dv-shadow 7s 2.4s both; z-index: 0; }
    @keyframes dv-shadow {
      0%,20% { transform: translateX(-50%) scaleX(1); opacity: .5; } 30% { transform: translateX(-50%) scaleX(1.12); opacity: .8; }
      32% { transform: translateX(-50%) scaleX(.92); opacity: .35; } 36%,68% { transform: translateX(-50%) scaleX(1); opacity: .5; }
      70% { transform: translateX(-50%) scaleX(1.08); opacity: .7; } 74%,100% { transform: translateX(-50%) scaleX(1); opacity: .5; }
    }
    .dv-cargo { position: relative; width: 230px; height: 140px; background: linear-gradient(135deg, #1A1C29, #0A0A0F); border-radius: 30px 8px 0 0; border-top: 2px solid #31364A; border-left: 1px solid #31364A; display: flex; align-items: center; overflow: hidden; z-index: 10; box-shadow: -10px 8px 26px rgba(0,0,0,0.6); }
    .dv-shine { position: absolute; top: 7px; left: 12px; width: 70%; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,.12), transparent); }
    .dv-cargo .dv-accent, .dv-cab .dv-accent { position: absolute; bottom: 26px; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--pkg1, #00FF9D), var(--pkg-accent, #fde68a), var(--pkg2, #00FF9D)); box-shadow: 0 0 12px 2px color-mix(in srgb, var(--pkg-accent, #00FF9D) 70%, transparent); z-index: 2; }
    .dv-cab .dv-accent { width: 80%; }
    .dv-logo { position: relative; z-index: 3; margin-left: 26px; display: flex; flex-direction: column; }
    .dv-mark { font-family: var(--font-logo); font-size: 30px; letter-spacing: -0.04em; color: #fff; line-height: 1; display: inline-flex; align-items: baseline; transform: rotate(-2deg); }
    .dv-mark .i1 { color: #FF3B6F; } .dv-mark .i2 { color: #FFD93D; } .dv-mark .i3 { color: #4ECDC4; }
    .dv-mark .d { width: 6px; height: 6px; background: #fff; border-radius: 50%; display: inline-block; margin-left: 3px; transform: translateY(-1px); }
    .dv-sub { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.34em; color: var(--accent-ui); text-transform: uppercase; margin-top: 3px; margin-left: 3px; }
    .dv-cab { position: relative; width: 96px; height: 116px; background: linear-gradient(135deg, #222536, #151722); border-radius: 0 40px 0 6px; border-top: 2px solid #3D435C; border-right: 1px solid #3D435C; z-index: 9; margin-left: -3px; box-shadow: 6px 8px 20px rgba(0,0,0,0.5); }
    .dv-window { position: absolute; right: 8px; top: 12px; width: 60px; height: 52px; background: linear-gradient(135deg, #05060A, #11131C); border: 3px solid #2A2E40; border-radius: 0 32px 0 10px; overflow: hidden; }
    .dv-window::before { content: ''; position: absolute; inset: -2px; background: linear-gradient(135deg, rgba(0,255,157,0.18), transparent 60%); }
    .dv-window::after { content: ''; position: absolute; top: -10%; right: 14px; width: 7px; height: 150%; background: rgba(255,255,255,0.12); transform: skewX(35deg); }
    .dv-headlight { position: absolute; right: 0; bottom: 14px; width: 11px; height: 20px; background: color-mix(in srgb, var(--pkg-accent, #E2E8F0) 55%, #fff); border-radius: 3px 9px 9px 3px; box-shadow: 0 0 18px 5px color-mix(in srgb, var(--pkg-accent, #fff) 75%, transparent); z-index: 10; }
    .dv-beam { position: absolute; right: -340px; bottom: 2px; width: 340px; height: 96px; background: linear-gradient(90deg, color-mix(in srgb, var(--pkg-accent, #fff) 32%, transparent), transparent 72%); border-radius: 0 100% 100% 0 / 0 50% 50% 0; transform: rotate(3deg); transform-origin: left center; mix-blend-mode: screen; filter: blur(3px); pointer-events: none; }
    .dv-brake { position: absolute; left: -3px; bottom: 44px; width: 9px; height: 26px; background: #dc2626; border-radius: 6px 0 0 6px; z-index: 12; animation: dv-brake 7s 2.4s both; }
    @keyframes dv-brake {
      0%,20% { background: #dc2626; box-shadow: 0 0 8px rgba(220,38,38,0.4); }
      22%,35% { background: #fca5a5; box-shadow: 0 0 40px 14px rgba(239,68,68,0.9); }
      37%,100% { background: #dc2626; box-shadow: 0 0 8px rgba(220,38,38,0.4); }
    }
    .dv-well { position: absolute; bottom: 4px; width: 74px; height: 38px; background: #05050A; border-radius: 38px 38px 0 0; z-index: 11; box-shadow: inset 0 12px 12px rgba(0,0,0,0.8); border-top: 1px solid #1F2233; }
    .dv-well-rear { left: 26px; } .dv-well-front { right: 18px; }
    .dv-wheel { position: absolute; bottom: -28px; width: 64px; height: 64px; border-radius: 50%; background: #050508; border: 8px solid #13151F; box-shadow: 0 10px 20px rgba(0,0,0,0.85), inset 0 4px 10px rgba(0,0,0,0.8); display: grid; place-items: center; z-index: 12; padding: 4px; }
    .dv-wheel-rear { left: 31px; } .dv-wheel-front { right: 23px; }
    .dv-tire { position: relative; width: 100%; height: 100%; border: 3px dashed #2D3245; border-radius: 50%; display: grid; place-items: center; animation: dv-spin 7s 2.4s both; }
    .dv-tire::before, .dv-tire::after { content: ''; position: absolute; inset: 0; margin: auto; background: #222536; }
    .dv-tire::before { width: 100%; height: 5px; } .dv-tire::after { width: 5px; height: 100%; }
    .dv-hub { width: 24px; height: 24px; background: linear-gradient(135deg, #252838, #151722); border: 3px solid #3D435C; border-radius: 50%; z-index: 2; display: grid; place-items: center; }
    .dv-hub::after { content: ''; width: 8px; height: 8px; background: #0A0A0F; border-radius: 50%; }
    @keyframes dv-spin {
      0% { transform: rotate(0deg); animation-timing-function: cubic-bezier(.3,.55,.45,1); }
      30% { transform: rotate(3600deg); animation-timing-function: linear; }
      70% { transform: rotate(3600deg); animation-timing-function: cubic-bezier(.45,.1,.6,1); }
      100% { transform: rotate(7200deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .dv-van, .dv-rig, .dv-shadow, .dv-brake, .dv-tire, .ri-package { animation: none !important; }
      .ri-package { opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <!-- persistent aurora backdrop (stays after the delivery intro fades) -->
  <canvas class="ri-aurora" id="ri-aurora" aria-hidden="true"></canvas>

  <!-- DELIVERY INTRO: the van arrives, drops the package, drives off -->
  <div class="receive-intro" id="receive-intro">

          <path d="M 380,400 L 380,330 L 450,330 L 450,200 L 470,180 L 490,200 L 490,280 L 530,280 L 530,120 L 550,80 L 570,120 L 570,250 L 620,250 L 620,350 L 700,350 L 700,400 Z"/>
          <path d="M 680,400 L 680,360 L 730,360 L 730,280 L 760,250 L 790,250 L 820,280 L 820,340 L 880,340 L 880,220 L 910,170 L 940,220 L 940,370 L 1000,370 L 1000,400 Z"/>

          <polygon points="1280,400 1280,340 1330,340 1330,270 1360,230 1390,270 1390,320 1440,320 1440,400"/>
        </g>
        <rect x="548" y="140" width="4" height="12" class="fpc-win"/>

        <rect x="548" y="200" width="4" height="16" class="fpc-win"/>
        <circle cx="220" cy="280" r="2" class="fpc-win" style="animation-delay: 2s;"/>
        <circle cx="310" cy="260" r="2.5" class="fpc-win"/>
        <rect x="770" y="290" width="10" height="20" rx="5" class="fpc-win" style="animation-delay: 0.5s;"/>
        <circle cx="1080" cy="280" r="1.5" class="fpc-win" style="animation-delay: 3s;"/>
        <rect x="1190" y="280" width="3" height="8" class="fpc-win"/>
      </svg>
    </div>
    <div class="ri-road"></div>
    <div class="ri-road-glow"></div>

    <div class="ri-package" id="ri-package" role="button" tabindex="0" aria-label="Open your gift">
      <span class="pk-body"></span><span class="pk-lid"></span><span class="pk-band-v"></span><span class="pk-bow"></span>
    </div>
    <div class="ri-hint"><span class="pip"></span>Tap your gift to open</div>
    <div class="ri-status" id="ri-status"></div>
    <div class="ri-prelude" id="ri-prelude"><div class="pl-text" id="ri-prelude-text"></div></div>

    <div class="dv-van">
      <div class="dv-rig">
        <div class="dv-shadow"></div>
        <div class="dv-cargo">
          <span class="dv-shine"></span>
          <span class="dv-accent"></span>
          <div class="dv-logo">
            <span class="dv-mark">G<span class="i1">I</span><span class="i2">I</span><span class="i3">I</span>FT<span class="d"></span></span>

  <div class="studio-grid"></div>
